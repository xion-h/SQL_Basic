<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide && lucide.icons[name]) {
                    const iconNode = lucide.icons[name];
                    const svg = lucide.createElement(iconNode);
                    svg.setAttribute('width', size);
                    svg.setAttribute('height', size);
                    svg.setAttribute('class', `lucide lucide-${name} ${className}`);
                    svg.setAttribute('stroke-width', '2.5');
                    svg.setAttribute('stroke', 'currentColor');
                    svg.setAttribute('fill', 'none');
                    containerRef.current.innerHTML = '';
                    containerRef.current.appendChild(svg);
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        // --- 상세 이론 및 분리된 실습용 데이터 세트 ---
        const STEPS_DATA = [
          {
            step: 1,
            title: "데이터 기본 규칙",
            grammar: "FROM & SELECT",
            subtitle: "빅쿼리의 표준 작성 형식 이해하기",
            theory: "SQL은 데이터를 찾아낼 대상을 정하고(FROM), 그 안에서 출력할 항목을 선택(SELECT)하는 것으로 시작합니다.\n\n[사용 방법]\nSELECT \n  컬럼명1, \n  컬럼명2 \nFROM `테이블` \n;\n\n[핵심 규칙]\n※ AS(별칭)를 사용하여 결과 화면의 이름을 예쁘게 지어줄 수 있습니다.\n※ 문자열은 반드시 작은따옴표(' ')로 감싸야 합니다.\n※ 명령문의 끝에는 세미콜론(;)을 붙여 쿼리의 종료를 알립니다.",
            checkpoint: "SELECT 절에서 만든 별칭(AS)은 실행 순서상 가장 나중에 생성됩니다. 따라서 같은 줄에 있는 다른 계산식에서 그 별칭을 바로 사용할 수 없습니다.",
            targetTable: "orders",
            exampleData: { "orders": [{ order_id: 'A1', price: 10000 }, { order_id: 'A2', price: 20000 }] },
            exerciseData: { "orders": [
              { order_id: 'A1', price: 10000, category: 'Food' }, 
              { order_id: 'A2', price: 20000, category: 'Tech' },
              { order_id: 'A3', price: 15000, category: 'Food' }
            ] },
            goal: "주문ID와 가격에 세금(10%)을 더한 값을 계산하세요.",
            logicDetail: "orders 테이블에서 1) 주문ID 컬럼과 2) 가격에 1.1을 곱해 세금이 포함된 값을 구한 후 final_price라는 이름을 붙여 출력합니다.",
            example: "SELECT \n  order_id, \n  price * 1.1 AS final_price \nFROM orders\n;",
            mockResult: [{ order_id: 'A1', final_price: 11000 }, { order_id: 'A2', final_price: 22000 }],
            exercises: [
              { id: 1, goal: "orders 테이블의 모든 컬럼(*)을 조회하세요.", target: "*", answer: "SELECT * FROM orders;", res: [{order_id:'A1', price:10000, category:'Food'},{order_id:'A2', price:20000, category:'Tech'},{order_id:'A3', price:15000, category:'Food'}], hint: "* 기호는 모든 컬럼을 가져옵니다." },
              { id: 2, goal: "orders 테이블에서 order_id와 price 만 조회하세요.", target: "order_id, price", answer: "SELECT order_id, price FROM orders;", res: [{order_id:'A1', price:10000},{order_id:'A2', price:20000},{order_id:'A3', price:15000}], hint: "SELECT order_id, price 를 입력하세요." },
              { id: 3, goal: "price에 부가세 1.1을 곱하여 조회하세요.", target: "order_id, price * 1.1", answer: "SELECT order_id, price * 1.1 FROM orders;", res: [{order_id:'A1', 'price * 1.1':11000},{order_id:'A2', 'price * 1.1':22000},{order_id:'A3', 'price * 1.1':16500}], hint: "별칭 없이 price * 1.1 로 작성하세요." },
              { id: 4, goal: "order_id를 '주문ID'라는 한글 별칭으로 조회하세요.", target: "주문ID", answer: "SELECT order_id AS 주문ID FROM orders;", res: [{주문ID:'A1'},{주문ID:'A2'},{주문ID:'A3'}], hint: "AS 주문ID 를 사용하세요." },
              { id: 5, goal: "[종합] order_id와 category를 조회하고, price에 1.1을 곱해 'tax_price'라는 별칭을 부여하여 모두 함께 조회하세요.", target: "order_id, category, tax_price", answer: "SELECT order_id, category, price * 1.1 AS tax_price FROM orders;", res: [{order_id:'A1', category:'Food', tax_price:11000},{order_id:'A2', category:'Tech', tax_price:22000},{order_id:'A3', category:'Food', tax_price:16500}], hint: "SELECT order_id, category, price * 1.1 AS tax_price FROM orders; 형식을 따르세요." }
            ]
          },
          {
            step: 2,
            title: "조건으로 거르기",
            grammar: "WHERE",
            subtitle: "원하는 데이터만 골라내는 필터링",
            theory: "WHERE 절은 특정 조건에 맞는 행만 골라냅니다.\nAND를 사용해 여러 조건을 동시에 적용할 수 있습니다.\n\n[사용 방법]\nSELECT \n  * \nFROM 테이블 \nWHERE 컬럼명 = '값' \n  AND 숫자컬럼 > 100\n;\n\n※ LIKE, IN, BETWEEN 등 다양한 필터 연산자를 활용할 수 있습니다.\n- LIKE: '서%' (서로 시작하는 문자열)\n- IN: ('서울', '경기') (목록 중 하나라도 포함)\n- BETWEEN A AND B: A와 B 사이 범위",
            checkpoint: "데이터에 빈 값(NULL)이 포함된 경우 일반적인 비교(=)로는 잡히지 않습니다. 반드시 'IS NULL' 또는 'IS NOT NULL'을 사용하세요.",

              { id: 2, goal: "city가 '서울'이고, age가 20 이상인 유저의 u_id를 조회하세요.", target: "u_id", answer: "SELECT u_id FROM users WHERE city = '서울' AND age >= 20;", res: [{u_id:1}], hint: "AND를 사용하여 두 조건을 연결하세요." },
              { id: 3, goal: "city가 '서'로 시작하는 모든 정보를 조회하세요. (LIKE 사용)", target: "*", answer: "SELECT * FROM users WHERE city LIKE '서%';", res: [{u_id:1, city:'서울', age:25},{u_id:4, city:'서울', age:15}], hint: "LIKE '서%'" },
              { id: 4, goal: "city가 '서울' 또는 '인천'인 유저 정보를 조회하세요. (IN 사용)", target: "*", answer: "SELECT * FROM users WHERE city IN ('서울', '인천');", res: [{u_id:1, city:'서울', age:25},{u_id:3, city:'인천', age:19},{u_id:4, city:'서울', age:15}], hint: "IN ('서울', '인천')" },
              { id: 5, goal: "서울 거주 고객 중 나이가 10대~20대(10~29세)인 정보를 조회하세요. (BETWEEN AND 사용)", target: "*", answer: "SELECT * FROM users WHERE city = '서울' AND age BETWEEN 10 AND 29;", res: [{u_id:1, city:'서울', age:25},{u_id:4, city:'서울', age:15}], hint: "age BETWEEN 10 AND 29" },
              { id: 6, goal: "city 정보가 입력되어 있는(비어있지 않은) 데이터의 u_id를 찾으세요. (IS NOT NULL 사용)", target: "u_id", answer: "SELECT u_id FROM users WHERE city IS NOT NULL;", res: [{u_id:1},{u_id:2},{u_id:3},{u_id:4}], hint: "WHERE city IS NOT NULL" }
            ]
          },
          {
            step: 3,
            title: "데이터 연산하기",
            grammar: "COUNT, SUM, AVG, MAX, MIN",
            subtitle: "수치 데이터의 집계와 요약",
            theory: "집계 함수는 대량의 행을 요약하여 하나의 통계치를 만듭니다. 빅쿼리는 거대한 데이터 집계에 특화되어 있습니다.\n\n[사용 방법]\nSELECT \n  COUNT(*), \n  SUM(숫자컬럼), \n  MAX(숫자컬럼) \nFROM 테이블\n;\n\n[집계 함수 문법]\n- COUNT(*): 전체 행 개수\n- SUM(컬럼): 합계\n- AVG(컬럼): 평균\n- MAX(컬럼): 최댓값\n- MIN(컬럼): 최솟값",
            checkpoint: "집계 함수는 기본적으로 NULL 값을 무시합니다. AVG 계산 시 분모에서 빠진다는 점을 주의하세요.",
            targetTable: "sales",
            exampleData: { "sales": [{ u_id: 'A1', amt: 5000 }, { u_id: 'A2', amt: 15000 }] },
            exerciseData: { "sales": [
              { sale_id: 1, u_id: 'A1', category: '수박', amt: 5000, qty: 2 }, 
              { sale_id: 2, u_id: 'A2', category: '딸기', amt: 15000, qty: 1 }, 
              { sale_id: 3, u_id: 'A1', category: '수박', amt: 10000, qty: 5 }

            goal: "전체 매출액 합계를 구하세요.",
            logicDetail: "sales 테이블에서 매출액(amt)의 총합(SUM)을 계산합니다.",
            example: "SELECT \n  SUM(amt) \nFROM sales\n;",
            mockResult: [{ sum_amt: 30000 }],
            exercises: [
              { id: 1, goal: "전체 매출액(amt)의 합계를 구하세요.", target: "SUM(amt)", answer: "SELECT SUM(amt) FROM sales;", res: [{'sum(amt)':30000}], hint: "SUM(amt) 함수를 사용하세요." },
              { id: 2, goal: "category가 '수박'인 데이터의 전체 판매 수량(qty) 총합을 구하세요.", target: "SUM(qty)", answer: "SELECT SUM(qty) FROM sales WHERE category = '수박';", res: [{'sum(qty)':7}], hint: "WHERE category = '수박' 조건을 추가하세요." },
              { id: 3, goal: "매출액(amt)이 10000 이상인 판매 건수(행 개수)를 세어보세요.", target: "COUNT(*)", answer: "SELECT COUNT(*) FROM sales WHERE amt >= 10000;", res: [{'count(*)':2}], hint: "WHERE amt >= 10000 조건을 추가하세요." },
              { id: 4, goal: "평균 매출액을 구하고 'avg_amt'라고 이름 붙이세요.", target: "avg_amt", answer: "SELECT AVG(amt) AS avg_amt FROM sales;", res: [{avg_amt:10000}], hint: "AVG(amt) AS avg_amt" },

            theory: "데이터를 특정 기준(지역 등)으로 그룹화합니다. HAVING은 그룹화된 결과에 필터를 겁니다.\n\n[사용 방법]\nSELECT \n  기준컬럼, \n  SUM(숫자컬럼) \nFROM 테이블 \nGROUP BY 기준컬럼 \nHAVING SUM(숫자컬럼) > 5000\n;",
            checkpoint: "WHERE는 그룹화 전 개별 행 필터, HAVING은 그룹화된 후 집계된 수치에 대한 필터입니다.",
            targetTable: "sales_region",
            exampleData: { "sales_region": [{ region: '서울', amt: 5000 }, { region: '부산', amt: 3000 }] },

        // --- 빅쿼리 시뮬레이터 실시간 검증 엔진 (고도화됨) ---
        // 해결: 내부 객체를 지우지 않고 DROP TABLE IF EXISTS를 사용하여 메모리 참조 오류(undefined) 및 중복(already exists) 완벽 차단
        const bigQueryEngine = (input, currentEx, sourceDataObj) => {
          if (!input) return { success: false, error: "명령어를 입력해주세요." };
          if (!input.trim().endsWith(';')) return { success: false, error: "문법 오류: 쿼리 맨 끝에 세미콜론(;)이 빠졌습니다." };
          
          let executedData = null;
          let executionError = null;
          let isDataCorrect = false;
          
          try {
              let sqlForAlasql = input.trim()
                  .replace(/`([^`]+)`/g, (match, p1) => { const parts = p1.split('.'); return parts[parts.length - 1]; })
                  .replace(/INT64/gi, 'INT');
                  
              if (sqlForAlasql.toUpperCase().includes('QUALIFY')) {
                  throw new Error("QUALIFY 구문 등 윈도우 함수는 브라우저 가상 엔진에서 결과창 렌더링을 지원하지 않습니다.");
              }
        
              // 안전한 초기화: 기본 메모리 공간에 테이블을 DROP 후 새로 만듦
              Object.entries(sourceDataObj).forEach(([tbl, rows]) => {
                  alasql(`DROP TABLE IF EXISTS ${tbl}`);
                  alasql(`CREATE TABLE ${tbl}`);
                  
                  // 방어 로직: 테이블이 생성되지 않은 경우를 대비
                  if (!alasql.tables[tbl]) {
                      alasql.tables[tbl] = { data: [] };
                  }
                  alasql.tables[tbl].data = JSON.parse(JSON.stringify(rows));
              });
              
              executedData = alasql(sqlForAlasql);
              
              // 결과 데이터 검증 로직: 사용자가 별칭을 'a', 's' 등으로 다르게 주어도, 
              // 최종적으로 뽑혀 나온 컬럼의 내용물이 정답(currentEx.res)과 같다면 정답 처리
              if (executedData && currentEx.res && executedData.length === currentEx.res.length) {
                  const normalize = (data) => {
                      return data.map(row => {
                          const newRow = {};
                          Object.keys(row).forEach(key => {
                              // 'a.name' 같이 별칭이 붙어나온 경우 'name'으로 통일시켜 비교
                              const cleanKey = key.includes('.') ? key.split('.')[1] : key;
                              newRow[cleanKey.toLowerCase()] = row[key];
                          });
                          return JSON.stringify(Object.entries(newRow).sort());
                      }).sort();
                  };
                  
                  const userResult = normalize(executedData);
                  const expectedResult = normalize(currentEx.res);
                  
                  isDataCorrect = JSON.stringify(userResult) === JSON.stringify(expectedResult);
                  
                  // 단일 집계 함수 예외 처리: 1행 1열짜리 단일 데이터의 경우, 
                  // 엔진별로 컬럼명이 달라 오답이 되는 현상을 막기 위해 '값'만 비교하여 동일하면 정답 인정
                  if (!isDataCorrect && executedData.length === 1 && Object.keys(executedData[0]).length === 1 && Object.keys(currentEx.res[0]).length === 1) {
                      const userVal = Object.values(executedData[0])[0];
                      const expVal = Object.values(currentEx.res[0])[0];
                      if (String(userVal) === String(expVal)) {
                          isDataCorrect = true;
                      }
                  }
              }
          } catch (err) {
              executionError = "실행 오류: " + err.message;
          }
          
          // 오답이더라도 실행된 데이터가 있다면 무조건 화면에 출력(data: executedData)
          if (isDataCorrect) {
            return { success: true, data: executedData };
          } else {
            return { 
                success: false, 
                data: executedData, 
                error: executionError || "오답입니다. 추출해야 할 컬럼명과 필터 조건이 문제 의도와 일치하는지 확인하세요." 
            };
          }
        };

                                <button onClick={()=>{setEngineResult(bigQueryEngine(userQuery, currentData.exercises[exerciseIdx], currentData.exerciseData))}} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl text-xs font-black transition-all flex items-center gap-2 shadow-lg">RUN QUERY <Icon name="play" size={14} fill="white" /></button>
                              </div>
                              <textarea className="w-full bg-transparent border-none focus:ring-0 font-mono text-xl h-48 resize-none placeholder-slate-700 leading-relaxed" placeholder="이곳에 쿼리를 작성하세요..." value={userQuery} onChange={(e)=>setUserQuery(e.target.value)} spellCheck="false" />
                              
                              {engineResult && (
                                <div className={`mt-10 p-8 rounded-[2rem] border-2 animate-in zoom-in-95 duration-500 ${engineResult.success ? 'bg-emerald-50 border-emerald-500 text-slate-900' : 'bg-rose-50 border-rose-400 text-slate-900'}`}>
                                  <div className="flex items-start gap-4 mb-6">
                                    {engineResult.success ? <Icon name="check-square" size={32} className="text-emerald-500"/> : <Icon name="alert-circle" size={32} className="text-rose-500"/>}
                                    <div className="text-base space-y-1 flex-1">
                                      <p className={`font-black text-2xl ${engineResult.success ? 'text-emerald-600' : 'text-rose-600'}`}>{engineResult.success ? "정답입니다! (Correct Answer)" : "오답 (Incorrect)"}</p>
                                      <p className={`font-medium ${engineResult.success ? 'text-slate-600' : 'text-rose-500'}`}>{engineResult.error || "작성하신 쿼리가 성공적으로 실행되었습니다. 아래 결과를 확인하세요."}</p>
                                    </div>
                                  </div>
                                  {engineResult.data !== null && engineResult.data !== undefined && (
                                    <div className={`mt-6 pt-8 border-t ${engineResult.success ? 'border-emerald-200' : 'border-rose-200'}`}>
                                      <h5 className={`text-sm font-black uppercase mb-4 flex items-center gap-2 ${engineResult.success ? 'text-emerald-600' : 'text-rose-600'}`}><Icon name="table" size={16}/> 내가 작성한 쿼리의 실행 결과 (Result)</h5>
                                      <div className={`overflow-x-auto rounded-2xl border-2 bg-white ${engineResult.success ? 'border-emerald-200' : 'border-rose-200'}`}>
                                        <table className="min-w-full text-sm text-left border-collapse">
                                          <thead className={`${engineResult.success ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'} border-b`}><tr>
                                            {engineResult.data.length > 0 
                                              ? Object.keys(engineResult.data[0]).map(k=><th key={k} className={`px-6 py-4 font-bold text-center border-x ${engineResult.success ? 'text-slate-600 border-emerald-100' : 'text-slate-600 border-rose-100'}`}>{k}</th>)
                                              : <th className="px-6 py-4 font-bold text-center">Result</th>}
                                          </tr></thead>
                                          <tbody>
                                            {engineResult.data.length > 0 
                                              ? engineResult.data.map((row,i)=><tr key={i} className={`border-b ${engineResult.success ? 'border-emerald-50' : 'border-rose-50'}`}>{Object.values(row).map((v,j)=><td key={j} className={`px-6 py-4 text-slate-700 font-mono border-x ${engineResult.success ? 'border-emerald-50' : 'border-rose-50'} ${getAlignmentClass(v)}`}>{v !== null && v !== undefined ? String(v) : 'NULL'}</td>)}</tr>)
                                              : <tr><td className="px-6 py-4 text-center text-slate-500 font-medium">조건에 맞는 데이터가 없습니다. (0 Rows)</td></tr>}
                                          </tbody>
                                        </table>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              )}
                            </div>
                            <div className="flex justify-between items-center pt-2">
                              <button onClick={() => alert(`힌트: ${currentData.exercises[exerciseIdx].hint}`)} className="text-slate-400 hover:text-blue-600 text-sm font-black flex items-center gap-2 transition-colors uppercase"><Icon name="help-circle" size={18}/> 힌트 보기</button>
                              {engineResult && engineResult.success && (
                                <button onClick={() => { if(exerciseIdx < currentData.exercises.length - 1) setExerciseIdx(exerciseIdx + 1); else if(activeStep < STEPS_DATA.length - 1) { setActiveStep(activeStep + 1); setExerciseIdx(0); document.getElementById('mainContentScroll').scrollTop = 0; } setUserQuery(''); setEngineResult(null); }} className="bg-blue-600 text-white px-12 py-5 rounded-[2rem] font-black hover:scale-105 transition-all shadow-xl flex items-center gap-3 text-xl">다음 문제 <Icon name="chevron-right" size={24}/></button>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>
                    </main>
                  </React.Fragment>
                )}

                {/* 4. 실무 적용 뷰 */}
                {view === 'practical' && (
                  <React.Fragment>
                    <aside className="sidebar">
                      <div className="space-y-2 pb-10">
                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 text-center">Homework</h2>
                        {PRACTICAL_DATA.map((s, i) => (
                          <button key={i} onClick={() => { setPracStep(i); setPracQuery(''); setPracResult(null); document.getElementById('pracContentScroll').scrollTop = 0; }} className={`w-full text-left p-4 rounded-xl transition-all flex items-center gap-3 ${pracStep === i ? 'bg-blue-600 text-white shadow-lg translate-x-1' : 'hover:bg-slate-50 text-slate-600 border border-transparent'}`}>
                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-[11px] font-black flex-none ${pracStep === i ? 'bg-white/20' : 'bg-slate-100'}`}>H{i + 1}</div>
                            <div className="overflow-hidden leading-tight"><div className="text-[11px] font-black truncate">{s.title}</div><div className="text-[9px] font-bold opacity-70 uppercase mt-1 tracking-tighter">Business Logic</div></div>
                          </button>
                        ))}
                      </div>
                    </aside>

                    <main className="content flex-1 overflow-y-auto p-6 lg:p-12 pb-40 bg-slate-50/50" id="pracContentScroll">
                      <div className="max-w-5xl mx-auto space-y-16 animate-in fade-in duration-700 pb-20">
                        <div className="space-y-4">
                          <div className="inline-flex items-center gap-2 text-blue-600 font-black text-xs uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-full border border-blue-100"><Icon name="sparkles" size={14} /> <span>Practical Master Course</span></div>
                          <h2 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tight">실무 적용 과제 (Homework)</h2>
                          <p className="text-xl text-slate-500 font-medium italic break-keep">비즈니스 상황에 대한 다중 테이블 결합 예제입니다.</p>
                        </div>
                        
                        <div className="bg-white rounded-[3rem] p-10 md:p-12 border-2 border-slate-100 shadow-xl space-y-12">
                          <div className="space-y-6">
                            <h4 className="text-xl font-black flex items-center gap-2 text-slate-900"><div className="w-1.5 h-6 bg-blue-600 rounded-full"/>실무 환경 테이블</h4>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                              {Object.entries(PRAC_TABLE_DATA).map(([tbl, rows]) => (
                                <div key={tbl} className="bg-slate-50 rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                  <div className="bg-slate-100 px-4 py-3 text-[11px] font-black text-slate-600 border-b border-slate-200">Table: {tbl}</div>
                                  <div className="overflow-x-auto"><table className="min-w-full text-[10px] text-left border-collapse">
                                    <thead className="bg-white border-b border-slate-100"><tr>{Object.keys(rows[0]).map(k=><th key={k} className="px-3 py-2 font-bold text-slate-500 border-x">{k}</th>)}</tr></thead>
                                    <tbody>{rows.map((row, i)=><tr key={i} className="border-b border-slate-50">{Object.values(row).map((v,j)=><td key={j} className="px-3 py-2 text-slate-600 border-x font-mono">{v}</td>)}</tr>)}</tbody>
                                  </table></div>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="space-y-8 pt-8 border-t border-slate-100">
                            <div className="bg-amber-50 p-8 rounded-2xl border-2 border-amber-100 space-y-5">
                              <h5 className="text-sm font-black text-amber-700 uppercase tracking-widest flex items-center gap-2"><Icon name="sparkles" size={18} /> 비즈니스 시나리오</h5>
                              <p className="text-slate-900 font-black text-2xl leading-tight break-keep">{currentPrac.title}</p>
                              <p className="text-slate-700 text-lg font-medium leading-relaxed bg-white/60 p-4 rounded-xl border border-amber-200/50 break-keep">{currentPrac.scenario}</p>
                              <div className="inline-flex items-center gap-3 pt-4 border-t border-amber-200/50">
                                <span className="text-sm font-black text-rose-500 uppercase tracking-tight">[추출해야 할 컬럼]</span>
                                <code className="bg-white px-4 py-1.5 rounded-lg text-base font-black text-slate-700 border-2 border-amber-200 shadow-sm">{currentPrac.target}</code>
                              </div>
                              <div className="mt-4 p-4 bg-emerald-50 border border-emerald-200 rounded-xl">
                                <h6 className="text-[11px] font-black text-emerald-600 uppercase tracking-widest mb-2 flex items-center gap-1"><Icon name="check-circle" size={14} /> 정답 확인 (검증용)</h6>
                                <pre className="text-sm font-mono text-slate-800 whitespace-pre-wrap"><code>{currentPrac.answer}</code></pre>
                              </div>
                            </div>

                            <div className="bg-slate-950 rounded-[2.5rem] p-10 lg:p-12 text-blue-300 relative shadow-inner">
                              <div className="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
                                  <span className="text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2"><Icon name="code" size={16}/> BigQuery Simulator</span>
                                  <button onClick={()=>{setPracResult(bigQueryEngine(pracQuery, currentPrac, PRAC_TABLE_DATA))}} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl text-xs font-black transition-all flex items-center gap-2 shadow-lg">RUN QUERY <Icon name="play" size={14} fill="white" /></button>
                              </div>
                              <textarea className="w-full bg-transparent border-none focus:ring-0 font-mono text-xl h-48 resize-none placeholder-slate-700 leading-relaxed" placeholder="이곳에 쿼리를 작성하세요..." value={pracQuery} onChange={(e)=>setPracQuery(e.target.value)} spellCheck="false" />
                              
                              {pracResult && (
                                <div className={`mt-10 p-8 rounded-[2rem] border-2 animate-in zoom-in-95 duration-500 ${pracResult.success ? 'bg-emerald-50 border-emerald-500 text-slate-900' : 'bg-rose-50 border-rose-400 text-slate-900'}`}>
                                  <div className="flex items-start gap-4 mb-6">
                                    {pracResult.success ? <Icon name="check-square" size={32} className="text-emerald-500"/> : <Icon name="alert-circle" size={32} className="text-rose-500"/>}
                                    <div className="text-base space-y-1 flex-1">
                                      <p className={`font-black text-2xl ${pracResult.success ? 'text-emerald-600' : 'text-rose-600'}`}>{pracResult.success ? "정답입니다! (Correct Answer)" : "오답 (Incorrect)"}</p>
                                      <p className={`font-medium ${pracResult.success ? 'text-slate-600' : 'text-rose-500'}`}>{pracResult.error || "쿼리가 성공적으로 실행되었습니다."}</p>
                                    </div>
                                  </div>
                                  {pracResult.data !== null && pracResult.data !== undefined && (
                                    <div className={`mt-6 pt-8 border-t ${pracResult.success ? 'border-emerald-200' : 'border-rose-200'}`}>
                                      <h5 className={`text-sm font-black uppercase mb-4 flex items-center gap-2 ${pracResult.success ? 'text-emerald-600' : 'text-rose-600'}`}><Icon name="table" size={16}/> 실행 결과 (Result)</h5>
                                      <div className="overflow-x-auto rounded-2xl border-2 bg-white"><table className="min-w-full text-sm text-left border-collapse">
                                        <thead className="bg-slate-50 border-b"><tr>{pracResult.data.length > 0 && Object.keys(pracResult.data[0]).map(k=><th key={k} className="px-6 py-4 font-bold text-center border-x">{k}</th>)}</tr></thead>
                                        <tbody>{pracResult.data.map((row,i)=><tr key={i} className="border-b">{Object.values(row).map((v,j)=><td key={j} className="px-6 py-4 font-mono border-x">{v !== null ? String(v) : 'NULL'}</td>)}</tr>)}</tbody>
                                      </table></div>
                                    </div>
                                  )}
                                </div>
                              )}
                            </div>
                            <div className="flex justify-between items-center pt-2">
                              <button onClick={() => alert(`힌트: ${currentPrac.hint}`)} className="text-slate-400 hover:text-blue-600 text-sm font-black flex items-center gap-2 transition-colors uppercase"><Icon name="help-circle" size={18}/> 힌트 보기</button>
                              {pracResult && pracResult.success && (
                                <button onClick={() => { if(pracStep < PRACTICAL_DATA.length - 1) { setPracStep(pracStep + 1); setPracQuery(''); setPracResult(null); document.getElementById('pracContentScroll').scrollTop = 0; } }} className="bg-blue-600 text-white px-12 py-5 rounded-[2rem] font-black hover:scale-105 transition-all shadow-xl flex items-center gap-3 text-xl">다음 과제 <Icon name="chevron-right" size={24}/></button>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>
                    </main>
                  </React.Fragment>
                )}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
