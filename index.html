<!DOCTYPE html>
<html lang="ko">
<head>

    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <style>

        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide && lucide.icons[name]) {
                    const iconNode = lucide.icons[name];
                    const svg = lucide.createElement(iconNode);
                    svg.setAttribute('width', size);
                    svg.setAttribute('height', size);
                    svg.setAttribute('class', `lucide lucide-${name} ${className}`);
                    svg.setAttribute('stroke-width', '2.5');
                    svg.setAttribute('stroke', 'currentColor');
                    svg.setAttribute('fill', 'none');
                    containerRef.current.innerHTML = '';
                    containerRef.current.appendChild(svg);
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        // --- 상세 이론 및 분리된 실습용 데이터 세트 ---
        const STEPS_DATA = [
          {
            step: 1,
            title: "데이터 기본 규칙",
            grammar: "FROM & SELECT",
            subtitle: "빅쿼리의 표준 작성 형식 이해하기",
            theory: "SQL은 데이터를 찾아낼 대상을 정하고(FROM),\n그 안에서 출력할 항목을 선택(SELECT)하는 것으로 시작합니다.\n\n[사용 방법]\nSELECT \n  컬럼명1, \n  컬럼명2 \nFROM `테이블` \n;\n\n[핵심 규칙]\n※ AS(별칭)를 사용하여 결과 화면의 이름을 예쁘게 지어줄 수 있습니다.\n※ 문자열은 반드시 작은따옴표(' ')로 감싸야 합니다.\n※ 명령문의 끝에는 세미콜론(;)을 붙여 쿼리의 종료를 알립니다.",
            checkpoint: "SELECT 절에서 만든 별칭(AS)은 실행 순서상 가장 나중에 생성됩니다.\n따라서 같은 줄에 있는 다른 계산식에서 그 별칭을 바로 사용할 수 없습니다.",
            targetTable: "orders",
            exampleData: { "orders": [{ order_id: 'A1', price: 10000 }, { order_id: 'A2', price: 20000 }] },
            exerciseData: { "orders": [
              { order_id: 'A1', price: 10000, category: 'Food' }, 
              { order_id: 'A2', price: 20000, category: 'Tech' },
              { order_id: 'A3', price: 15000, category: 'Food' }
            ] },
            goal: "주문ID와 가격에 세금(10%)을 더한 값을 계산하세요.",
            logicDetail: "orders 테이블에서 1) 주문ID 컬럼과 2) 가격에 1.1을 곱해 세금이 포함된 값을 구한 후\nfinal_price라는 이름을 붙여 출력합니다.",
            example: "SELECT \n  order_id, \n  price * 1.1 AS final_price \nFROM orders\n;",
            mockResult: [{ order_id: 'A1', final_price: 11000 }, { order_id: 'A2', final_price: 22000 }],
            exercises: [
              { id: 1, goal: "[상황: 전체 내역 스캔] 분석을 시작하기 전, orders 테이블이 어떻게 생겼는지 파악하기 위해\n모든 컬럼(*)을 조회하세요.", target: "*", answer: "SELECT * FROM orders;", res: [{order_id:'A1', price:10000, category:'Food'},{order_id:'A2', price:20000, category:'Tech'},{order_id:'A3', price:15000, category:'Food'}], hint: "* 기호는 모든 컬럼을 가져옵니다." },
              { id: 2, goal: "[상황: 특정 컬럼 추출] 보안팀의 요청으로 카테고리는 제외하고,\n주문번호(order_id)와 결제금액(price) 두 개의 컬럼만 추출하세요.", target: "order_id, price", answer: "SELECT order_id, price FROM orders;", res: [{order_id:'A1', price:10000},{order_id:'A2', price:20000},{order_id:'A3', price:15000}], hint: "SELECT order_id, price 를 입력하세요." },
              { id: 3, goal: "[상황: 부가세 계산] 현재 price는 공급가액입니다.\n소비자가를 구하기 위해 price에 부가세 1.1을 곱하여 주문번호와 함께 조회하세요.", target: "order_id, price * 1.1", answer: "SELECT order_id, price * 1.1 FROM orders;", res: [{order_id:'A1', 'price * 1.1':11000},{order_id:'A2', 'price * 1.1':22000},{order_id:'A3', 'price * 1.1':16500}], hint: "별칭 없이 price * 1.1 로 작성하세요." },
              { id: 4, goal: "[상황: 리포트 별칭 부여] 비개발자도 알아보기 쉽도록,\norder_id를 '주문ID'라는 한글 이름표(별칭)를 달아 조회하세요.", target: "주문ID", answer: "SELECT order_id AS 주문ID FROM orders;", res: [{주문ID:'A1'},{주문ID:'A2'},{주문ID:'A3'}], hint: "AS 주문ID 를 사용하세요." },
              { id: 5, goal: "[종합 예제] 주문번호, 카테고리를 조회하고,\nprice에 1.1을 곱한 값에 'tax_price'라는 별칭을 부여하여 모두 함께 조회하세요.", target: "order_id, category, tax_price", answer: "SELECT order_id, category, price * 1.1 AS tax_price FROM orders;", res: [{order_id:'A1', category:'Food', tax_price:11000},{order_id:'A2', category:'Tech', tax_price:22000},{order_id:'A3', category:'Food', tax_price:16500}], hint: "SELECT order_id, category, price * 1.1 AS tax_price FROM orders; 형식을 따르세요." }
            ]
          },
          {
            step: 2,
            title: "조건으로 거르기",
            grammar: "WHERE",
            subtitle: "원하는 데이터만 골라내는 필터링",
            theory: "WHERE 절은 특정 조건에 맞는 행만 골라냅니다.\nAND를 사용해 여러 조건을 동시에 적용할 수 있습니다.\n\n[실무 팁: WHERE 1=1 AND]\n실무에서는 조건을 껐다 켜기 편하게 만들려고 `WHERE 1=1`을 먼저 적고, 그 아래에 `AND 조건`을 나열하는 방식을 자주 씁니다. 이때 조건과 조건 사이는 콤마(,)가 아니라 반드시 `AND`로 연결해야 합니다.\n\n[사용 방법]\nSELECT \n  * \nFROM 테이블 \nWHERE 1=1 \n  AND 컬럼명 = '값' \n  AND 숫자컬럼 > 100\n;\n\n[다양한 필터 연산자]\n※ LIKE, IN, BETWEEN 등 다양한 필터 연산자를 활용할 수 있습니다.\n- LIKE: '서%' (서로 시작하는 문자열)\n- IN: ('서울', '경기') (목록 중 하나라도 포함)\n- BETWEEN A AND B: A와 B 사이 범위",
            checkpoint: "데이터에 빈 값(NULL)이 포함된 경우 일반적인 비교(=)로는 잡히지 않습니다.\n반드시 'IS NULL' 또는 'IS NOT NULL'을 사용하세요.",
            targetTable: "users",
            exampleData: { "users": [{ u_id: 1, city: '서울', age: 25 }] },
            exerciseData: { "users": [
              { u_id: 1, city: '서울', age: 25 }, 
              { u_id: 2, city: '부산', age: 32 }, 
              { u_id: 3, city: '인천', age: 19 },
              { u_id: 4, city: '서울', age: 15 },
              { u_id: 5, city: null, age: 40 }
            ] },
            goal: "서울 거주자 데이터만 찾기",
            logicDetail: "users 테이블에서 거주지가 '서울'인 데이터의 전체 컬럼을 가져옵니다.",
            example: "SELECT \n  * \nFROM users \nWHERE city = '서울'\n;",
            mockResult: [{ u_id: 1, city: '서울', age: 25 }, { u_id: 4, city: '서울', age: 15 }],
            exercises: [
              { id: 1, goal: "[상황: 특정 지역 타겟팅] 서울 지역 한정 프로모션을 기획 중입니다.\ncity가 '서울'인 유저의 모든 정보를 필터링해 주세요.", target: "*", answer: "SELECT * FROM users WHERE city = '서울';", res: [{u_id:1, city:'서울', age:25},{u_id:4, city:'서울', age:15}], hint: "WHERE city = '서울'" },
              { id: 2, goal: "[상황: 복합 조건 타겟팅] 주류 광고를 위해 성인(20세 이상)이면서\n서울에 거주하는 유저의 u_id만 따로 추출해 주세요.", target: "u_id", answer: "SELECT u_id FROM users WHERE city = '서울' AND age >= 20;", res: [{u_id:1}], hint: "AND를 사용하여 두 조건을 연결하세요." },
              { id: 3, goal: "[상황: 패턴 검색] '서' 자로 시작하는 모든 도시(서울, 서산 등)의 유저 정보를 조회하세요.\n(LIKE 연산자 사용)", target: "*", answer: "SELECT * FROM users WHERE city LIKE '서%';", res: [{u_id:1, city:'서울', age:25},{u_id:4, city:'서울', age:15}], hint: "LIKE '서%'" },
              { id: 4, goal: "[상황: 다중 포함 검색] 수도권 오프라인 행사 초청을 위해\ncity가 '서울'이거나 '인천'인 유저 정보를 골라내세요. (IN 연산자 사용)", target: "*", answer: "SELECT * FROM users WHERE city IN ('서울', '인천');", res: [{u_id:1, city:'서울', age:25},{u_id:3, city:'인천', age:19},{u_id:4, city:'서울', age:15}], hint: "IN ('서울', '인천')" },
              { id: 5, goal: "[상황: 범위 검색] 10~20대 트렌드 분석을 위해 나이가 10대에서 20대(10~29세) 사이이면서\n서울에 사는 고객 정보를 추출하세요. (BETWEEN AND 사용)", target: "*", answer: "SELECT * FROM users WHERE city = '서울' AND age BETWEEN 10 AND 29;", res: [{u_id:1, city:'서울', age:25},{u_id:4, city:'서울', age:15}], hint: "age BETWEEN 10 AND 29" },
              { id: 6, goal: "[상황: 결측치 제외] 데이터 정합성 확인을 위해, city 정보가 정상적으로 입력되어 있는\n(비어있지 않은) 데이터의 u_id만 찾으세요. (IS NOT NULL 사용)", target: "u_id", answer: "SELECT u_id FROM users WHERE city IS NOT NULL;", res: [{u_id:1},{u_id:2},{u_id:3},{u_id:4}], hint: "WHERE city IS NOT NULL" }
            ]
          },
          {
            step: 3,
            title: "데이터 연산하기",
            grammar: "COUNT, SUM, AVG, MAX, MIN",
            subtitle: "수치 데이터의 집계와 요약",
            theory: "집계 함수는 대량의 행을 요약하여 하나의 통계치를 만듭니다.\n빅쿼리는 거대한 데이터 집계에 특화되어 있습니다.\n\n[사용 방법]\nSELECT \n  COUNT(*), \n  SUM(숫자컬럼), \n  MAX(숫자컬럼) \nFROM 테이블\n;\n\n[집계 함수 문법]\n- COUNT(*): 전체 행 개수\n- SUM(컬럼): 합계\n- AVG(컬럼): 평균\n- MAX(컬럼): 최댓값\n- MIN(컬럼): 최솟값",
            checkpoint: "집계 함수는 기본적으로 NULL 값을 무시합니다.\nAVG 계산 시 분모에서 빠진다는 점을 주의하세요.",
            targetTable: "sales",
            exampleData: { "sales": [{ u_id: 'A1', amt: 5000 }, { u_id: 'A2', amt: 15000 }] },
            exerciseData: { "sales": [
              { sale_id: 1, u_id: 'A1', category: '수박', amt: 5000, qty: 2 }, 
              { sale_id: 2, u_id: 'A2', category: '딸기', amt: 15000, qty: 1 }, 
              { sale_id: 3, u_id: 'A1', category: '수박', amt: 10000, qty: 5 }
            ] },
            goal: "전체 매출액 합계를 구하세요.",
            logicDetail: "sales 테이블에서 매출액(amt)의 총합(SUM)을 계산합니다.",
            example: "SELECT \n  SUM(amt) \nFROM sales\n;",
            mockResult: [{ sum_amt: 30000 }],
            exercises: [
              { id: 1, goal: "[상황: 총 매출 파악] 재무팀에 보고하기 위해\n지금까지 발생한 전체 매출액(amt)의 총합을 구하세요.", target: "SUM(amt)", answer: "SELECT SUM(amt) FROM sales;", res: [{'sum(amt)':30000}], hint: "SUM(amt) 함수를 사용하세요." },
              { id: 2, goal: "[상황: 특정 카테고리 집계] 과일 재고 관리를 위해\ncategory가 '수박'인 데이터만 걸러서 전체 판매 수량(qty) 총합을 구하세요.", target: "SUM(qty)", answer: "SELECT SUM(qty) FROM sales WHERE category = '수박';", res: [{'sum(qty)':7}], hint: "WHERE category = '수박' 조건을 추가하세요." },
              { id: 3, goal: "[상황: 고액 결제 건수 세기] 매출액(amt)이 10000 이상 발생한 VIP 결제가\n총 몇 건(행 개수)인지 세어보세요.", target: "COUNT(*)", answer: "SELECT COUNT(*) FROM sales WHERE amt >= 10000;", res: [{'count(*)':2}], hint: "WHERE amt >= 10000 조건을 추가하세요." },
              { id: 4, goal: "[상황: 고객 단가 확인] 1회 결제 시 유저들의 평균 결제액(객단가)을 구하고,\n그 컬럼의 이름을 'avg_amt'로 명명하세요.", target: "avg_amt", answer: "SELECT AVG(amt) AS avg_amt FROM sales;", res: [{avg_amt:10000}], hint: "AVG(amt) AS avg_amt" },
              { id: 5, goal: "[상황: 최대 실적 탐색] 이벤트 성과를 확인하기 위해,\n전체 데이터 중 한 번에 결제된 가장 높은 매출액을 찾으세요.", target: "MAX(amt)", answer: "SELECT MAX(amt) FROM sales;", res: [{'max(amt)':15000}], hint: "MAX(amt) 함수를 사용하세요." },

          {

            theory: "서로 다른 테이블에 흩어진 정보를 공통된 연결 고리(ID 등)를 기준으로 하나로 모읍니다.\n\n[JOIN의 1:N 뻥튀기(Fan-out) 현상]\nA테이블에 아이디가 1개인데, B테이블에 같은 아이디가 3개 있다면? JOIN 결과는 3줄로 늘어납니다. 데이터 분석 시 가장 흔한 실수이므로, 반드시 1:1 관계인지 1:N 관계인지 확인해야 합니다.\n\n[JOIN 유형별 실제 예시]\n<div class='flex flex-wrap gap-6 my-6'><div class='border border-slate-200 rounded-2xl overflow-hidden shadow-sm'><table class='text-sm text-left border-collapse w-48'><thead class='bg-slate-100 border-b border-slate-200'><tr><th colspan='2' class='px-4 py-2 font-black text-slate-700 text-center bg-slate-200/50'>주문내역 (A)</th></tr><tr><th class='border-r border-slate-200 px-4 py-2 font-bold text-slate-500 text-center'>주문ID</th><th class='px-4 py-2 font-bold text-slate-500 text-center'>유저</th></tr></thead><tbody><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='px-4 py-2 text-center font-bold text-blue-600'>유저A</td></tr><tr><td class='border-r border-slate-100 px-4 py-2 text-center'>주문2</td><td class='px-4 py-2 text-center text-slate-600'>유저B</td></tr></tbody></table></div><div class='border border-slate-200 rounded-2xl overflow-hidden shadow-sm'><table class='text-sm text-left border-collapse w-56'><thead class='bg-slate-100 border-b border-slate-200'><tr><th colspan='2' class='px-4 py-2 font-black text-slate-700 text-center bg-slate-200/50'>접속기록 (B)</th></tr><tr><th class='border-r border-slate-200 px-4 py-2 font-bold text-slate-500 text-center'>유저</th><th class='px-4 py-2 font-bold text-slate-500 text-center'>접속</th></tr></thead><tbody><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>유저A</td><td class='px-4 py-2 text-center'>오전</td></tr><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>유저A</td><td class='px-4 py-2 text-center'>오후</td></tr><tr><td class='border-r border-slate-100 px-4 py-2 text-center text-slate-600'>유저C</td><td class='px-4 py-2 text-center'>야간</td></tr></tbody></table></div></div>\n1. LEFT JOIN (A의 모든 데이터 보존)\n유저A의 접속기록이 2개이므로 주문1이 2줄로 뻥튀기됩니다. B에 없는 유저B의 접속기록은 NULL이 됩니다.\n<div class='my-4 border border-blue-200 rounded-2xl overflow-hidden shadow-sm max-w-lg'><table class='w-full text-sm border-collapse bg-white'><thead class='bg-blue-50 border-b border-blue-100'><tr><th class='border-r border-blue-100 px-4 py-2 font-bold text-blue-800 text-center'>주문ID</th><th class='border-r border-blue-100 px-4 py-2 font-bold text-blue-800 text-center'>유저</th><th class='px-4 py-2 font-bold text-blue-800 text-center'>접속</th></tr></thead><tbody><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오전</td></tr><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오후</td></tr><tr><td class='border-r border-slate-100 px-4 py-2 text-center'>주문2</td><td class='border-r border-slate-100 px-4 py-2 text-center text-slate-600'>B</td><td class='px-4 py-2 text-center font-black text-rose-500 bg-rose-50'>NULL</td></tr></tbody></table></div>\n2. INNER JOIN (양쪽에 모두 있는 교집합)\n양쪽에 모두 존재하는 유저A의 데이터만 뻥튀기되어 남습니다.\n<div class='my-4 border border-emerald-200 rounded-2xl overflow-hidden shadow-sm max-w-lg'><table class='w-full text-sm border-collapse bg-white'><thead class='bg-emerald-50 border-b border-emerald-100'><tr><th class='border-r border-emerald-100 px-4 py-2 font-bold text-emerald-800 text-center'>주문ID</th><th class='border-r border-emerald-100 px-4 py-2 font-bold text-emerald-800 text-center'>유저</th><th class='px-4 py-2 font-bold text-emerald-800 text-center'>접속</th></tr></thead><tbody><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오전</td></tr><tr><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오후</td></tr></tbody></table></div>\n3. FULL OUTER JOIN (합집합)\n어느 한쪽에만 있는 유저B와 유저C의 데이터도 모두 빈칸(NULL)을 채워 남깁니다.\n<div class='my-4 border border-purple-200 rounded-2xl overflow-hidden shadow-sm max-w-lg'><table class='w-full text-sm border-collapse bg-white'><thead class='bg-purple-50 border-b border-purple-100'><tr><th class='border-r border-purple-100 px-4 py-2 font-bold text-purple-800 text-center'>주문ID</th><th class='border-r border-purple-100 px-4 py-2 font-bold text-purple-800 text-center'>유저</th><th class='px-4 py-2 font-bold text-purple-800 text-center'>접속</th></tr></thead><tbody><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오전</td></tr><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오후</td></tr><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문2</td><td class='border-r border-slate-100 px-4 py-2 text-center text-slate-600'>B</td><td class='px-4 py-2 text-center font-black text-rose-500 bg-rose-50'>NULL</td></tr><tr><td class='border-r border-slate-100 px-4 py-2 text-center font-black text-rose-500 bg-rose-50'>NULL</td><td class='border-r border-slate-100 px-4 py-2 text-center text-slate-600'>C</td><td class='px-4 py-2 text-center'>야간</td></tr></tbody></table></div>",

                                                  : <tr><td className="px-6 py-4 text-center text-slate-500 font-medium">조건에 맞는 데이터가 없습니다. (0 Rows)</td></tr>}
                                              </tbody>
                                            </table>
                                          </div>
                                        </div>
                                      )}
                                    </div>
                                  )}
                                </div>
                                <div className="flex justify-between items-center pt-2">
                                  <button onClick={() => alert(`힌트: ${currentData.exercises[exerciseIdx].hint}`)} className="text-slate-400 hover:text-blue-600 text-sm font-black flex items-center gap-2 transition-colors uppercase"><Icon name="help-circle" size={18}/> 힌트 보기</button>
                                  {engineResult && engineResult.success && (
                                    <button onClick={() => { if(exerciseIdx < currentData.exercises.length - 1) setExerciseIdx(exerciseIdx + 1); else if(activeStep < STEPS_DATA.length - 1) { setActiveStep(activeStep + 1); setExerciseIdx(0); document.getElementById('mainContentScroll').scrollTop = 0; } setUserQuery(''); setEngineResult(null); }} className="bg-blue-600 text-white px-12 py-5 rounded-[2rem] font-black hover:scale-105 transition-all shadow-xl flex items-center gap-3 text-xl">다음 문제 <Icon name="chevron-right" size={24}/></button>
                                  )}
                                </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </main>
                  </React.Fragment>
                )}

                {view === 'practical' && (
                  <React.Fragment>
                    <aside className="sidebar">
                      <div className="space-y-2 pb-10">
                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 text-center">Homework</h2>
                        {PRACTICAL_DATA.map((s, i) => (
                          <button key={i} onClick={() => { setPracStep(i); setPracQuery(''); setPracResult(null); document.getElementById('pracContentScroll').scrollTop = 0; }} className={`w-full text-left p-4 rounded-xl transition-all flex items-center gap-3 ${pracStep === i ? 'bg-blue-600 text-white shadow-lg translate-x-1' : 'hover:bg-slate-50 text-slate-600 border border-transparent'}`}>
                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-[11px] font-black flex-none ${pracStep === i ? 'bg-white/20' : 'bg-slate-100'}`}>H{i + 1}</div>
                            <div className="overflow-hidden leading-tight"><div className="text-[11px] font-black truncate">{s.title}</div><div className="text-[9px] font-bold opacity-70 uppercase mt-1 tracking-tighter">Business Logic</div></div>
                          </button>
                        ))}
                      </div>
                    </aside>

                    <main className="content flex-1 overflow-y-auto p-6 lg:p-12 pb-40 bg-slate-50/50" id="pracContentScroll">
                      <div className="max-w-6xl mx-auto space-y-16 animate-in fade-in duration-700 pb-20">
                        <div className="space-y-4">
                          <div className="inline-flex items-center gap-2 text-blue-600 font-black text-xs uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-full border border-blue-100"><Icon name="sparkles" size={14} /> <span>Practical Master Course</span></div>
                          <h2 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tight">실무 적용 과제 (Homework)</h2>
                          <p className="text-xl text-slate-500 font-medium italic break-keep">비즈니스 상황에 대한 다중 테이블 결합 예제입니다.</p>
                        </div>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                           <div className="lg:col-span-5 space-y-8 lg:sticky lg:top-8">
                                <div className="bg-amber-50 p-8 rounded-3xl border-2 border-amber-100 space-y-5 shadow-sm">
                                  <h5 className="text-sm font-black text-amber-700 uppercase tracking-widest flex items-center gap-2"><Icon name="sparkles" size={18} /> 비즈니스 시나리오</h5>
                                  
                                  {/* 미션 목표 렌더링 개선 */}
                                  {renderGoalText(currentPrac.scenario)}

                                  <div className="inline-flex items-center gap-3 pt-4 border-t border-amber-200/50 w-full">
                                    <span className="text-sm font-black text-rose-500 uppercase tracking-tight">[추출 컬럼]</span>
                                    <code className="bg-white px-4 py-1.5 rounded-lg text-sm font-black text-slate-700 border-2 border-amber-200 shadow-sm flex-1 truncate">{currentPrac.target}</code>
                                  </div>
                                </div>

                                <div className="space-y-4">
                                  <h4 className="text-sm font-black flex items-center gap-2 text-slate-900 uppercase tracking-widest ml-2"><Icon name="database" size={16}/> 실무 환경 테이블</h4>
                                  <div className="flex flex-col gap-6">
                                    {Object.entries(PRAC_TABLE_DATA).map(([tbl, rows]) => (
                                      <div key={tbl} className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                        <div className="bg-slate-100 px-4 py-3 text-[11px] font-black text-slate-600 border-b border-slate-200">Table: {tbl}</div>
                                        <div className="overflow-x-auto"><table className="min-w-full text-[10px] text-left border-collapse">
                                          <thead className="bg-slate-50 border-b border-slate-100"><tr>{Object.keys(rows[0]).map(k=><th key={k} className="px-3 py-2 font-bold text-slate-500 border-x">{k}</th>)}</tr></thead>
                                          <tbody>{rows.map((row, i)=><tr key={i} className="border-b border-slate-50">{Object.values(row).map((v,j)=><td key={j} className="px-3 py-2 text-slate-600 border-x font-mono">{v}</td>)}</tr>)}</tbody>
                                        </table></div>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                                
                                {/* 복구된 정답 확인(검증용) 영역 */}
                                <div className="mt-6 p-5 bg-emerald-50/80 border border-emerald-200 rounded-2xl shadow-sm">
                                  <h6 className="text-xs font-black text-emerald-600 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="check-circle" size={16} /> 정답 확인 (검증용)</h6>
                                  <pre className="text-sm font-mono text-slate-800 whitespace-pre-wrap bg-white p-4 rounded-xl border border-emerald-100 shadow-inner"><code>{currentPrac.answer}</code></pre>
                                </div>
                           </div>

                           <div className="lg:col-span-7 flex flex-col space-y-6">
                              <div className="bg-slate-950 rounded-[2.5rem] p-10 lg:p-12 text-blue-300 relative shadow-inner">
                                <div className="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
                                    <span className="text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2"><Icon name="code" size={16}/> BigQuery Simulator</span>
                                    <button onClick={()=>{setPracResult(bigQueryEngine(pracQuery, currentPrac, PRAC_TABLE_DATA))}} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl text-xs font-black transition-all flex items-center gap-2 shadow-lg">RUN QUERY <Icon name="play" size={14} fill="white" /></button>
                                </div>
                                <textarea className="w-full bg-transparent border-none focus:ring-0 font-mono text-xl h-48 resize-none placeholder-slate-700 leading-relaxed" placeholder="이곳에 쿼리를 작성하세요..." value={pracQuery} onChange={(e)=>setPracQuery(e.target.value)} spellCheck="false" />
                                
                                {pracResult && (
                                  <div className={`mt-10 p-8 rounded-[2rem] border-2 animate-in zoom-in-95 duration-500 ${pracResult.success ? 'bg-emerald-50 border-emerald-500 text-slate-900' : 'bg-rose-50 border-rose-400 text-slate-900'}`}>
                                    <div className="flex items-start gap-4 mb-6">
                                      {pracResult.success ? <Icon name="check-square" size={32} className="text-emerald-500"/> : <Icon name="alert-circle" size={32} className="text-rose-500"/>}
                                      <div className="text-base space-y-1 flex-1">
                                        <p className={`font-black text-2xl ${pracResult.success ? 'text-emerald-600' : 'text-rose-600'}`}>{pracResult.success ? "정답입니다! (Correct Answer)" : "오답 (Incorrect)"}</p>
                                        <p className={`font-medium ${pracResult.success ? 'text-slate-600' : 'text-rose-500'} whitespace-pre-wrap break-keep`}>{pracResult.error || "쿼리가 성공적으로 실행되었습니다."}</p>
                                      </div>
                                    </div>
                                    {pracResult.data !== null && pracResult.data !== undefined && (
                                      <div className={`mt-6 pt-8 border-t ${pracResult.success ? 'border-emerald-200' : 'border-rose-200'}`}>
                                        <h5 className={`text-sm font-black uppercase mb-4 flex items-center gap-2 ${pracResult.success ? 'text-emerald-600' : 'text-rose-600'}`}><Icon name="table" size={16}/> 실행 결과 (Result)</h5>
                                        <div className="overflow-x-auto rounded-2xl border-2 bg-white"><table className="min-w-full text-sm text-left border-collapse">
                                          <thead className="bg-slate-50 border-b"><tr>{pracResult.data.length > 0 && Object.keys(pracResult.data[0]).map(k=><th key={k} className="px-3 py-2 font-bold text-center border-x">{k}</th>)}</tr></thead>
                                          <tbody>{pracResult.data.map((row, i)=><tr key={i} className="border-b">{Object.values(row).map((v,j)=><td key={j} className="px-3 py-2 font-mono border-x text-center">{v !== null ? String(v) : 'NULL'}</td>)}</tr>)}</tbody>
                                        </table></div>
                                      </div>
                                    )}
                                  </div>
                                )}
                              </div>
                              <div className="flex justify-between items-center pt-2">
                                <button onClick={() => alert(`힌트: ${currentPrac.hint}`)} className="text-slate-400 hover:text-blue-600 text-sm font-black flex items-center gap-2 transition-colors uppercase"><Icon name="help-circle" size={18}/> 힌트 보기</button>
                                {pracResult && pracResult.success && (
                                  <button onClick={() => { if(pracStep < PRACTICAL_DATA.length - 1) { setPracStep(pracStep + 1); setPracQuery(''); setPracResult(null); document.getElementById('pracContentScroll').scrollTop = 0; } }} className="bg-blue-600 text-white px-12 py-5 rounded-[2rem] font-black hover:scale-105 transition-all shadow-xl flex items-center gap-3 text-xl">다음 과제 <Icon name="chevron-right" size={24}/></button>
                                )}
                              </div>
                           </div>
                        </div>
                      </div>
                    </main>
                  </React.Fragment>
                )}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
