<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL 마스터 : 이론편 - 데이터 분석의 기초</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Alasql: 가상 SQL 엔진 -->
    <script src="https://cdn.jsdelivr.net/npm/alasql@4"></script>
    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 화면 스크롤 제어 및 폰트 설정 */
        html, body { height: 100vh; margin: 0; overflow: hidden; font-family: "Pretendard Variable", Pretendard, sans-serif; background-color: #f8fafc; }
        code, pre { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .break-keep { word-break: keep-all; }
        
        /* 완벽한 독립 스크롤을 위한 레이아웃 클래스 */
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .nav-bar { flex-shrink: 0; height: 5rem; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; z-index: 50; }
        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 18rem; flex-shrink: 0; background: white; border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 1.5rem; }
        .content { flex: 1; overflow-y: auto; padding: 2rem; background: #f8fafc; }
        
        /* 잠금장치 스타일 */
        .locked-overlay { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 20; border-radius: 2rem; }
        .locked-overlay span { background: white; padding: 12px 24px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; font-weight: 700; color: #475569; display: flex; align-items: center; gap: 8px; }

        /* 로그인 오버레이 */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.95); display:flex; justify-content:center; align-items:center; z-index:9999; backdrop-filter: blur(4px); }
        .login-box { background:white; padding:40px; border-radius:24px; text-align:center; width:360px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .login-box h2 { margin-top:0; color: #1e293b; font-size: 24px; font-weight: 900; margin-bottom: 8px; }
        .login-box input { width:100%; padding:16px; margin:24px 0; border:2px solid #e2e8f0; border-radius:12px; box-sizing:border-box; font-size: 20px; text-align: center; font-family: monospace; letter-spacing: 0.1em; transition: 0.2s; }
        .login-box input:focus { outline: none; border-color: #2563eb; }
    </style>
</head>
<body class="text-slate-900">
    <!-- 로그인 폼 -->
    <div id="loginOverlay">
        <div class="login-box">
            <h2>학습 시스템 입장</h2>
            <p style="font-size:14px; color:#64748b; font-weight: 500;">부여받은 입장 코드를 입력하세요</p>
            <input type="password" id="entryCode" placeholder="••••••••">
            <button onclick="window.checkLogin()" style="width:100%; background:#2563eb; color:white; border:none; padding:16px; border-radius:12px; font-weight:900; font-size:16px; cursor:pointer; transition:0.2s;">입장하기</button>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        // 전역 권한 관리
        let globalRole = ''; 
        window.checkLogin = function() {
            const code = document.getElementById('entryCode').value.trim();
            if (code === 'shinhj6401') {
                globalRole = 'admin';
                document.getElementById('loginOverlay').style.display = 'none';
                window.renderApp();
            } else if (code === 'edu') {
                globalRole = 'edu';
                document.getElementById('loginOverlay').style.display = 'none';
                window.renderApp();
            } else {
                alert("입장 코드가 올바르지 않습니다.");
            }
        };

        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "", fill = "none" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide && window.lucide.icons[name]) {
                    const iconNode = window.lucide.icons[name];
                    const svg = window.lucide.createElement(iconNode);
                    svg.setAttribute('width', size);
                    svg.setAttribute('height', size);
                    svg.setAttribute('class', `lucide lucide-${name} ${className}`);
                    svg.setAttribute('stroke-width', '2.5');
                    svg.setAttribute('stroke', 'currentColor');
                    svg.setAttribute('fill', fill);
                    containerRef.current.innerHTML = '';
                    containerRef.current.appendChild(svg);
                }
            }, [name, size, className, fill]);
            return <span ref={containerRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        // --- 텍스트 렌더링 도우미 (주제명 뱃지 및 줄바꿈 처리) ---
        const renderTheoryText = (text) => {
          const parts = text.split(/(\[[^\]]+\])/g);
          return parts.map((part, index) => {
            if (part.startsWith('[') && part.endsWith(']')) {
              const title = part.slice(1, -1);
              //  인 경우 이미지 플레이스홀더로 렌더링
              if (title.startsWith('Image of ')) {
                const altText = title.replace('Image of ', '');
                return (
                  <div key={index} className="w-full bg-slate-200 rounded-xl my-6 flex items-center justify-center text-slate-500 font-bold shadow-sm" style={{ minHeight: '120px' }}>
                    [ 🖼️ {altText} ]
                  </div>
                );
              }
              return (
                <div key={index} className="inline-flex items-center w-fit bg-blue-50 text-blue-700 px-5 py-2 rounded-full text-[14px] font-black mt-10 mb-3 border border-blue-200 shadow-sm">
                  {title}
                </div>
              );
            }
            let textContent = part;
            if (index > 0 && parts[index - 1].startsWith('[')) {
              textContent = textContent.replace(/^\n+/, '');
            }
            if (index < parts.length - 1 && parts[index + 1].startsWith('[')) {
              textContent = textContent.replace(/\n+$/, '');
            }
            return <div key={index} className="whitespace-pre-wrap text-slate-700 leading-relaxed font-medium" dangerouslySetInnerHTML={{ __html: textContent }} />;
          });
        };

        const renderGoalText = (text) => {
            const match = text.match(/^(\[.*?\])\s*(.*)/is);
            if (match) {
                return (
                    <div className="space-y-4">
                        <span className="inline-block bg-amber-500 text-white px-3 py-1 rounded-lg text-[13px] font-black tracking-wide shadow-sm">
                            {match[1]}
                        </span>
                        <div className="text-2xl md:text-3xl font-black text-slate-900 leading-snug break-keep whitespace-pre-wrap">
                            {match[2]}
                        </div>
                    </div>
                );
            }
            return <div className="text-2xl md:text-3xl font-black text-slate-900 leading-snug break-keep whitespace-pre-wrap">{text}</div>;
        };

        // --- 빅쿼리 시뮬레이터 실시간 검증 엔진 ---
        const bigQueryEngine = (input, currentEx, sourceDataObj) => {
          if (!input) return { success: false, data: [], error: "명령어를 입력해주세요." };
          if (!input.trim().endsWith(';')) return { success: false, data: [], error: "문법 오류: 쿼리 맨 끝에 세미콜론(;)이 빠졌습니다." };

          const lowerInput = input.trim().replace(/\s+/g, ' ').toLowerCase();
          const lowerAnswer = currentEx.answer.trim().replace(/\s+/g, ' ').toLowerCase();
          const goalText = currentEx.goal || currentEx.scenario || '';

          // 1. 테이블명 대소문자 엄격 검사
          const usedTables = [];
          const fromJoinRegex = /(?:FROM|JOIN)\s+`?([a-zA-Z0-9_]+)`?/gi;
          let m;
          while ((m = fromJoinRegex.exec(input)) !== null) {
              usedTables.push(m[1]);
          }
          
          for (const ut of usedTables) {
              const exactMatch = Object.keys(sourceDataObj).find(k => k === ut);
              const lowerMatch = Object.keys(sourceDataObj).find(k => k.toLowerCase() === ut.toLowerCase());
              
              if (!exactMatch && lowerMatch) {
                  return {
                      success: false,
                      data: [],
                      error: `실행 오류: 빅쿼리에서는 테이블명 대/소문자를 엄격히 구분합니다. '${ut}'가 아닌 정확한 테이블명 '${lowerMatch}'(으)로 작성해주세요.`
                  };
              }
          }

          const cleanStrForLiteral = (str) => {
              let cleaned = str.replace(/\b[a-z_`][a-z0-9_`]*\./gi, '');
              cleaned = cleaned.replace(/\s+/g, ' ').replace(/\bas\b/gi, '');
              Object.keys(sourceDataObj).forEach(tbl => {
                  const regex = new RegExp(`\\b${tbl}\\b\\s+(?!(?:join|on|where|group|order|having|select|left|right|inner|full|outer|cross|union|limit)\\b)[a-z0-9_]+\\b`, 'gi');
                  cleaned = cleaned.replace(regex, tbl);
              });
              return cleaned.replace(/\s+/g, '')
                            .replace(/1=1and/gi, '')
                            .replace(/1=1/gi, '')
                            .replace(/[()]/g, '')
                            .replace(/;/g, '');
          };
                                       
          const normalizedInputLiteral = cleanStrForLiteral(input);
          const normalizedAnswerLiteral = cleanStrForLiteral(currentEx.answer);
          
          const normalizedInput = normalizedInputLiteral.toLowerCase();
          const normalizedAnswer = normalizedAnswerLiteral.toLowerCase();

          let executedData = null;
          let executionError = null;
          let isDataCorrect = false;
          let showSuccessMessageInsteadOfData = false;
          
          let isStringCorrect = false;
          if (normalizedInput === normalizedAnswer || normalizedInput === normalizedAnswer.replace(/;$/, '').trim() || normalizedInput + ';' === normalizedAnswer) {
              const getLiterals = (str) => {
                  const matches = str.match(/['"][^'"]*['"]/g);
                  return matches ? matches.map(mat => mat.slice(1, -1)) : [];
              };
              const inputLits = getLiterals(input).join('');
              const answerLits = getLiterals(currentEx.answer).join('');
              if (inputLits === answerLits) {
                  isStringCorrect = true;
              }
          }
          
          try {
              const alasql = window.alasql;
              if (!alasql) throw new Error("SQL 엔진 로딩 중입니다.");

              let sqlForAlasql = input.trim()
                  .replace(/`([^`]+)`/g, (match, p1) => { const parts = p1.split('.'); return parts[parts.length - 1]; })
                  .replace(/INT64/gi, 'INT');

              sqlForAlasql = sqlForAlasql.replace(/OVER\s*\(([^)]+)\)/gi, (match, inner) => {
                  return `OVER(${inner.replace(/[a-zA-Z0-9_`]+\./g, '')})`;
              });
                  
              if (sqlForAlasql.toUpperCase().includes('QUALIFY')) {
                  throw new Error("QUALIFY 구문 등 윈도우 함수는 브라우저 가상 엔진에서 직접 렌더링을 지원하지 않습니다. 서브쿼리를 이용해 주세요.");
              }

              const createTableMatch = sqlForAlasql.match(/CREATE\s+OR\s+REPLACE\s+TABLE\s+([a-zA-Z0-9_`]+)\s+AS/i);
              if (createTableMatch) {
                  showSuccessMessageInsteadOfData = true;
                  sqlForAlasql = sqlForAlasql.replace(/CREATE\s+OR\s+REPLACE\s+TABLE\s+[a-zA-Z0-9_`]+\s+AS/i, '');
              }

              sqlForAlasql = sqlForAlasql.replace(/FULL\s+OUTER\s+JOIN/gi, 'OUTER JOIN');

              const literalMap = {
                  'active': 'Active', 'churned': 'Churned',
                  'vip': 'VIP', 'gold': 'Gold', 'silver': 'Silver', 'bronze': 'Bronze',
                  'pc': 'PC', 'mobile': 'Mobile', 'tablet': 'Tablet',
                  'food': 'Food', 'tech': 'Tech'
              };
              Object.keys(literalMap).forEach(key => {
                  const regex = new RegExp(`['"]${key}['"]`, 'gi');
                  sqlForAlasql = sqlForAlasql.replace(regex, `'${literalMap[key]}'`);
              });
              
              Object.keys(sourceDataObj).forEach(tbl => {
                  const regex = new RegExp(`\\b${tbl}\\b`, 'gi');
                  sqlForAlasql = sqlForAlasql.replace(regex, tbl.toLowerCase());
              });

              const selectMatch = sqlForAlasql.match(/SELECT\s+(.+?)\s+FROM/is);
              if (selectMatch && !sqlForAlasql.toUpperCase().includes('SELECT * FROM (SELECT')) {
                  sqlForAlasql = sqlForAlasql.replace(/GROUP\s+BY\s+([\d\s,]+?)(\s*HAVING|\s*ORDER\s+BY|\s*LIMIT|\s*\)|\s*;|\s*$)/gis, (match, indicesStr, rest, offset, string) => {
                      const upToMatch = string.substring(0, offset);
                      const selectMatches = [...upToMatch.matchAll(/SELECT\s+(.+?)\s+FROM/gis)];
                      if (selectMatches.length > 0) {
                          const lastSelect = selectMatches[selectMatches.length - 1][1];
                          const localSelectItems = lastSelect.split(/,(?![^\(]*\))/).map(s => s.trim());
                          const indices = indicesStr.split(',').map(s => parseInt(s.trim(), 10));
                          const cols = indices.map(idx => {
                              if (!isNaN(idx) && idx > 0 && idx <= localSelectItems.length) {
                                  let item = localSelectItems[idx - 1];
                                  let aliasMatch = item.match(/\bAS\s+([a-zA-Z0-9_가-힣]+)$/is) || item.match(/\s+([a-zA-Z0-9_가-힣]+)$/is);
                                  if (aliasMatch) return aliasMatch[1].trim();
                                  return item.trim();
                              }
                              return String(idx);
                          });
                          return `GROUP BY ${cols.join(', ')}${rest}`;
                      }
                      return match;
                  });

                  sqlForAlasql = sqlForAlasql.replace(/ORDER\s+BY\s+([^;]+?)(\s*LIMIT|\s*\)|\s*;|\s*$)/gis, (match, orderStr, rest, offset, string) => {
                      const upToMatch = string.substring(0, offset);
                      const selectMatches = [...upToMatch.matchAll(/SELECT\s+(.+?)\s+FROM/gis)];
                      if (selectMatches.length > 0) {
                          const lastSelect = selectMatches[selectMatches.length - 1][1];
                          const localSelectItems = lastSelect.split(/,(?![^\(]*\))/).map(s => s.trim());
                          const orderItems = orderStr.split(',').map(s => {
                              let parts = s.trim().split(/\s+/).filter(Boolean);
                              let idx = parseInt(parts[0], 10);
                              if (!isNaN(idx) && idx > 0 && idx <= localSelectItems.length) {
                                  let item = localSelectItems[idx - 1];
                                  let aliasMatch = item.match(/\bAS\s+([a-zA-Z0-9_가-힣]+)$/is) || item.match(/\s+([a-zA-Z0-9_가-힣]+)$/is);
                                  parts[0] = aliasMatch ? aliasMatch[1].trim() : item.trim();
                              }
                              return parts.join(' ');
                          });
                          return `ORDER BY ${orderItems.join(', ')}${rest}`;
                      }
                      return match;
                  });
              }
        
              Object.entries(sourceDataObj).forEach(([tbl, rows]) => {
                  const lowerTbl = tbl.toLowerCase();
                  alasql(`DROP TABLE IF EXISTS \`${lowerTbl}\``);
                  alasql(`CREATE TABLE \`${lowerTbl}\``);
                  if (!alasql.tables[lowerTbl]) {
                      alasql.tables[lowerTbl] = { data: [] };
                  }
                  alasql.tables[lowerTbl].data = JSON.parse(JSON.stringify(rows));
              });
              
              executedData = alasql(sqlForAlasql);
              
              if (executedData && currentEx.res && executedData.length === currentEx.res.length) {
                  if (normalizedAnswer.includes('createorreplicatable') && !normalizedInput.includes('createorreplicatable')) {
                      isDataCorrect = false;
                      executionError = "테이블 생성 구문(CREATE OR REPLACE TABLE)이 누락되었습니다.";
                  } else {
                      const isOrderRequired = goalText.includes('정렬') || lowerAnswer.includes('order by') || lowerAnswer.includes('limit');
                      const expectedKeys = currentEx.res && currentEx.res.length > 0 ? Object.keys(currentEx.res[0]).map(k => k.toLowerCase()) : [];

                      const normalizeValuesOnly = (data, sortRows) => {
                          const mappedData = data.map(row => {
                              const vals = Object.values(row).map(v => v !== null && v !== undefined ? String(v) : 'NULL');
                              return JSON.stringify(vals);
                          });
                          return sortRows ? mappedData.sort() : mappedData;
                      };
                      
                      const userValMatrix = normalizeValuesOnly(executedData, !isOrderRequired);
                      const expValMatrix = normalizeValuesOnly(currentEx.res, !isOrderRequired);
                      
                      if (JSON.stringify(userValMatrix) === JSON.stringify(expValMatrix)) {
                          isDataCorrect = true;
                      }

                      if (!isDataCorrect) {
                          const normalize = (data, sortRows) => {
                              const mappedData = data.map(row => {
                                  const newRow = {};
                                  Object.keys(row).forEach(key => {
                                      const cleanKey = key.includes('.') ? key.split('.')[1] : key;
                                      const lowerKey = cleanKey.toLowerCase();
                                      if (newRow[lowerKey] !== undefined && newRow[lowerKey] !== null && (row[key] === null || row[key] === undefined)) {
                                          return; 
                                      }
                                      newRow[lowerKey] = row[key];
                                  });
                                  expectedKeys.forEach(ek => {
                                      if (!(ek in newRow)) {
                                          newRow[ek] = null;
                                      }
                                  });
                                  return JSON.stringify(Object.entries(newRow).sort());
                              });
                              return sortRows ? mappedData.sort() : mappedData;
                          };
                          
                          const userResult = normalize(executedData, !isOrderRequired);
                          const expectedResult = normalize(currentEx.res, !isOrderRequired);
                          
                          if (JSON.stringify(userResult) === JSON.stringify(expectedResult)) {
                              isDataCorrect = true;
                          }
                      }
                  }
              }
          } catch (err) {
              executionError = "실행 오류: " + err.message;
              if (err.message.includes('Table does not exist')) {
                  executionError += "\n\n💡 [분석가 팁] 빅쿼리에서 테이블명은 대/소문자를 엄격하게 구분합니다. 우측 상단의 데이터 세트의 테이블명과 동일한지 확인해 주세요.";
              }
              if (normalizedInput.includes('where') && normalizedInput.match(/where\s+.*,/i) && err.message.toLowerCase().includes('parseerror')) {
                  executionError += "\n\n💡 [분석가 팁] WHERE 절에서 여러 조건을 연결할 때는 콤마(,)가 아니라 반드시 'AND' 또는 'OR'를 사용해야 합니다.";
              }
          }

          let finalData = executedData;
          if (finalData === null || finalData === undefined || !Array.isArray(finalData)) {
              finalData = []; 
              if (executionError) {
                  executionError += "\n\n(문법 오류로 인해 쿼리가 정상 실행되지 않아 결과 표가 생략되었습니다.)";
              }
          }

          if (goalText.includes('비정상 결제 탐지')) {
              if (normalizedInput.includes('nameisnull') && !/[a-z0-9_`]+\.nameisnull/i.test(normalizedInput)) {
                  return {
                      success: false,
                      data: finalData,
                      error: "💡 [분석가 팁] 소속 테이블 누락: 실무 JOIN에서는 반드시 'b.name IS NULL'처럼 테이블 별칭을 명시해야 합니다."
                  };
              }
          }

          const rules = [
              { keyword: 'group by', condition: lowerAnswer.includes('group by'), error: "문법 오류 (그룹화 필요): 집계 함수와 일반 컬럼을 함께 조회하려면 반드시 GROUP BY 절을 사용해야 합니다." },
              { keyword: 'order by', condition: goalText.includes('정렬') || lowerAnswer.includes('order by') || lowerAnswer.includes('limit'), error: "오답입니다. 문제에서 요구한 '정렬(ORDER BY)' 구문이 누락되었습니다." },
              { keyword: 'with ', condition: lowerAnswer.includes('with '), error: "오답입니다. 문제의 의도에 맞게 'WITH' 절을 사용하여 임시 테이블을 선언해 주세요." },
              { keyword: '(select', condition: lowerAnswer.includes('(select') && goalText.includes('서브쿼리'), error: "오답입니다. 문제의 의도에 맞게 서브쿼리 '(SELECT ...)' 구문을 활용하여 작성해 주세요.", alt: '( select' },
              { keyword: 'row_number', condition: lowerAnswer.includes('row_number'), error: "오답입니다. 문제의 의도에 맞게 'ROW_NUMBER()' 윈도우 함수를 사용해 주세요." },
              { keyword: 'concat', condition: lowerAnswer.includes('concat'), error: "오답입니다. 'CONCAT' 함수를 사용하여 문자열을 결합해 주세요." },
              { keyword: 'substr', condition: lowerAnswer.includes('substr'), error: "오답입니다. 'SUBSTR' 함수를 사용하여 문자열을 추출해 주세요." },
              { keyword: 'distinct', condition: lowerAnswer.includes('distinct'), error: "오답입니다. 'DISTINCT' 구문을 사용하여 중복을 제거해 주세요." },
              { keyword: 'left join', condition: lowerAnswer.includes('left join'), error: "오답입니다. 기준 데이터가 누락되지 않도록 'LEFT JOIN'을 사용해야 합니다." }
          ];

          for (const rule of rules) {
              if (rule.condition) {
                  let hasKeyword = lowerInput.includes(rule.keyword);
                  if (rule.alt && !hasKeyword) {
                      hasKeyword = lowerInput.includes(rule.alt);
                  }
                  if (!hasKeyword && !isStringCorrect) {

            theory: "데이터를 특정 기준(지역, 카테고리 등)으로 그룹화하고,\n조건을 건 뒤, 최종 결과를 정렬합니다.\n\n[GROUP BY (그룹화) : 왜 해야 할까요?]\n데이터베이스는 기본적으로 '개별 데이터'의 무작위 나열입니다.\n수만 건의 주문 데이터에서 \"우리 회사의 지역별 총 매출액은 얼마지?\"라는 질문에 답하려면, 흩어져 있는 서울 데이터는 서울끼리, 부산 데이터는 부산끼리 '뭉쳐서' 합계를 구해야 합니다.\n이처럼 방대한 데이터를 특정 기준(지역, 카테고리 등)으로 묶어 통계적으로 요약하여 비즈니스 의사결정을 내리기 위해 반드시 거쳐야 하는 과정입니다.\n\n[엑셀의 '피벗 테이블'과 비교]\n가장 직관적인 비유는 엑셀의 '피벗 테이블'입니다.\n<div class='my-4 pl-4 border-l-4 border-blue-500 space-y-3'><div><strong class='text-blue-700 text-xl font-black'>GROUP BY</strong> : 피벗 테이블의 <strong class='text-blue-700 text-xl font-black'>행(Row)</strong> 영역에 해당</div><div><strong class='text-blue-700 text-xl font-black'>집계 함수(SUM, COUNT 등)</strong> : 피벗 테이블의 <strong class='text-blue-700 text-xl font-black'>값(Value)</strong> 영역에 해당</div></div>\n거대한 엑셀 시트에서 피벗 테이블을 만들고 '지역'을 행에 넣듯, SQL에서는 <code class='text-slate-800 bg-slate-100 px-1 rounded'>GROUP BY 지역</code>을 코드로 지시하여 같은 지역끼리 한 바구니에 담는 것입니다.\n\n\n<div class='flex flex-col md:flex-row gap-8 mb-6 p-8 bg-slate-50 border border-slate-200 rounded-2xl items-center justify-center shadow-sm'><div class='border border-slate-300 bg-white rounded-lg overflow-hidden shadow-sm w-full md:w-auto' style='min-width: 240px;'><div class='bg-slate-200/50 text-center py-3 text-sm font-bold text-slate-600'>원본 데이터 (Table)</div><table class='w-full text-sm text-center border-collapse'><thead class='bg-slate-100 border-b border-slate-200'><tr><th class='px-6 py-3 border-r border-slate-200'>지역</th><th class='px-6 py-3'>매출</th></tr></thead><tbody><tr><td class='px-6 py-3 border-r border-slate-100'>서울</td><td class='px-6 py-3'>100</td></tr><tr><td class='px-6 py-3 border-r border-slate-100'>서울</td><td class='px-6 py-3'>200</td></tr><tr><td class='px-6 py-3 border-r border-slate-100 bg-amber-50'>부산</td><td class='px-6 py-3 bg-amber-50'>150</td></tr><tr><td class='px-6 py-3 border-r border-slate-100 bg-amber-50'>부산</td><td class='px-6 py-3 bg-amber-50'>50</td></tr></tbody></table></div><div class='text-blue-500 font-black text-2xl flex flex-col items-center gap-2 mx-4'><span class='text-base text-blue-700 font-black'>GROUP BY 지역</span><span class='my-1'>➡</span><span class='text-base text-blue-700 font-black'>SUM(매출)</span></div><div class='border border-blue-200 bg-white rounded-lg overflow-hidden shadow-md w-full md:w-auto' style='min-width: 240px;'><div class='bg-blue-100 text-center py-3 text-sm font-black text-blue-800'>피벗 테이블 (결과)</div><table class='w-full text-sm text-center border-collapse'><thead class='bg-blue-50 border-b border-blue-100'><tr><th class='px-6 py-3 border-r border-blue-100 font-bold text-blue-700'>지역 (행)</th><th class='px-6 py-3 font-bold text-blue-700'>총매출 (값)</th></tr></thead><tbody><tr><td class='px-6 py-3 border-r border-blue-50 font-bold'>서울</td><td class='px-6 py-3 text-rose-600 font-bold'>300</td></tr><tr><td class='px-6 py-3 border-r border-blue-50 font-bold bg-amber-50'>부산</td><td class='px-6 py-3 text-rose-600 font-bold bg-amber-50'>200</td></tr></tbody></table></div></div>\n\n[실무 활용 사례]\n- 카테고리별 성과 분석: `GROUP BY 상품군` (어떤 상품군이 많이 팔렸나?)\n- 고객 생애 가치(LTV): `GROUP BY 고객ID` (유저별 총 결제액 요약)\n- 이탈 분석 및 트렌드: `GROUP BY 가입연도` (가입 코호트별 유지율 파악)\n\n[HAVING (그룹 결과 필터링)]\nGROUP BY로 묶여서 계산된 '최종 집계 결과(예: 지역별 총 매출)'에 조건을 걸어 필터링합니다.\n개별 데이터를 거르는 WHERE와 역할이 다릅니다.\n\n[WHERE와 HAVING의 치명적 차이: 왜 구분해야 할까?]\nWHERE는 데이터를 '그룹으로 묶기 전(원본 상태)'에 필터링하고,\nHAVING은 데이터를 '그룹으로 묶은 후(집계 완료 상태)'에 필터링합니다.\n\n피벗 테이블을 만들고 나서 '합계 매출 1억 이상인 지역'만 필터링하는 것이 바로 HAVING의 역할입니다.\n컴퓨터는 WHERE 절을 처리할 때 아직 SUM이나 COUNT의 결과를 모르기 때문에,\n집계 함수는 반드시 HAVING에서만 써야 에러가 나지 않습니다.\n\n[ORDER BY (정렬)]\n모든 작업이 끝난 최종 결과를 보기 좋게 정렬합니다.\n기본값은 오름차순(ASC)이며, 내림차순은 DESC를 붙입니다.",

><td class='px-4 py-2 text-center'>야간</td></tr></tbody></table></div></div>\n1. LEFT JOIN (A의 모든 데이터 보존)\n유저A의 접속기록이 2개이므로 주문1이 2줄로 뻥튀기됩니다. B에 없는 유저B의 접속기록은 NULL이 됩니다.\n<div class='my-4 border border-blue-200 rounded-2xl overflow-hidden shadow-sm max-w-lg'><table class='w-full text-sm border-collapse bg-white'><thead class='bg-blue-50 border-b border-blue-100'><tr><th class='border-r border-blue-100 px-4 py-2 font-bold text-blue-800 text-center'>주문ID</th><th class='border-r border-blue-100 px-4 py-2 font-bold text-blue-800 text-center'>유저</th><th class='px-4 py-2 font-bold text-blue-800 text-center'>접속</th></tr></thead><tbody><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오전</td></tr><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오후</td></tr><tr><td class='border-r border-slate-100 px-4 py-2 text-center'>주문2</td><td class='border-r border-slate-100 px-4 py-2 text-center text-slate-600'>B</td><td class='px-4 py-2 text-center font-black text-rose-500 bg-rose-50'>NULL</td></tr></tbody></table></div>\n2. INNER JOIN (양쪽에 모두 있는 교집합)\n양쪽에 모두 존재하는 유저A의 데이터만 뻥튀기되어 남습니다.\n<div class='my-4 border border-emerald-200 rounded-2xl overflow-hidden shadow-sm max-w-lg'><table class='w-full text-sm border-collapse bg-white'><thead class='bg-emerald-50 border-b border-emerald-100'><tr><th class='border-r border-emerald-100 px-4 py-2 font-bold text-emerald-800 text-center'>주문ID</th><th class='border-r border-emerald-100 px-4 py-2 font-bold text-emerald-800 text-center'>유저</th><th class='px-4 py-2 font-bold text-emerald-800 text-center'>접속</th></tr></thead><tbody><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오전</td></tr><tr><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오후</td></tr></tbody></table></div>\n3. FULL OUTER JOIN (합집합)\n어느 한쪽에만 있는 유저B와 유저C의 데이터도 모두 빈칸(NULL)을 채워 남깁니다.\n<div class='my-4 border border-purple-200 rounded-2xl overflow-hidden shadow-sm max-w-lg'><table class='w-full text-sm border-collapse bg-white'><thead class='bg-purple-50 border-b border-purple-100'><tr><th class='border-r border-purple-100 px-4 py-2 font-bold text-purple-800 text-center'>주문ID</th><th class='border-r border-purple-100 px-4 py-2 font-bold text-purple-800 text-center'>유저</th><th class='px-4 py-2 font-bold text-purple-800 text-center'>접속</th></tr></thead><tbody><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오전</td></tr><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문1</td><td class='border-r border-slate-100 px-4 py-2 text-center font-bold text-blue-600'>A</td><td class='px-4 py-2 text-center'>오후</td></tr><tr class='border-b border-slate-100'><td class='border-r border-slate-100 px-4 py-2 text-center'>주문2</td><td class='border-r border-slate-100 px-4 py-2 text-center text-slate-600'>B</td><td class='px-4 py-2 text-center font-black text-rose-500 bg-rose-50'>NULL</td></tr><tr><td class='border-r border-slate-100 px-4 py-2 text-center font-black text-rose-500 bg-rose-50'>NULL</td><td class='border-r border-slate-100 px-4 py-2 text-center text-slate-600'>C</td><td class='px-4 py-2 text-center'>야간</td></tr></tbody></table></div>",

                           <div className="lg:col-span-5 space-y-8 lg:sticky lg:top-8">
                                <div className="bg-amber-50 p-8 rounded-3xl border-2 border-amber-100 space-y-5 shadow-sm">
                                  <h5 className="text-sm font-black text-amber-700 uppercase tracking-widest flex items-center gap-2"><Icon name="sparkles" size={18} /> 비즈니스 시나리오</h5>
                                  
                                  {/* 미션 목표 렌더링 개선 */}
                                  {renderGoalText(currentPrac.scenario)}

                                  <div className="inline-flex items-center gap-3 pt-4 border-t border-amber-200/50 w-full">
                                    <span className="text-sm font-black text-rose-500 uppercase tracking-tight">[추출 컬럼]</span>
                                    <code className="bg-white px-4 py-1.5 rounded-lg text-sm font-black text-slate-700 border-2 border-amber-200 shadow-sm flex-1 truncate">{currentPrac.target}</code>
                                  </div>
                                </div>

                                <div className="space-y-4">
                                  <h4 className="text-sm font-black flex items-center gap-2 text-slate-900 uppercase tracking-widest ml-2"><Icon name="database" size={16}/> 실무 환경 테이블</h4>
                                  <div className="flex flex-col gap-6">
                                    {Object.entries(PRAC_TABLE_DATA).map(([tbl, rows]) => (
                                      <div key={tbl} className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                        <div className="bg-slate-100 px-4 py-3 text-[11px] font-black text-slate-600 border-b border-slate-200">Table: {tbl}</div>
                                        <div className="overflow-x-auto"><table className="min-w-full text-[10px] text-left border-collapse">
                                          <thead className="bg-slate-50 border-b border-slate-100"><tr>{Object.keys(rows[0]).map(k=><th key={k} className="px-3 py-2 font-bold text-slate-500 border-x">{k}</th>)}</tr></thead>
                                          <tbody>{rows.map((row, i)=><tr key={i} className="border-b border-slate-50">{Object.values(row).map((v,j)=><td key={j} className="px-3 py-2 text-slate-600 border-x font-mono">{v}</td>)}</tr>)}</tbody>
                                        </table></div>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                                
                                {(userRole === 'admin' || (pracResult && pracResult.success) || solvedPrac.includes(pracStep)) && (
                                    <div className="mt-6 p-5 bg-emerald-50 border border-emerald-200 rounded-2xl shadow-sm">
                                        <details className="group" open={showPracAnswer}>
                                            <summary onClick={(e) => { e.preventDefault(); setShowPracAnswer(!showPracAnswer); }} className="text-xs font-black text-emerald-600 uppercase tracking-widest flex items-center gap-2 cursor-pointer list-none select-none hover:text-emerald-700 transition-colors">
                                                <Icon name="check-circle" size={16} className="text-emerald-500 group-open:text-emerald-600 transition-colors" /> 
                                                {userRole === 'admin' ? '▼ 강사용 정답 보기' : '▼ 모범 정답 확인하기'}
                                            </summary>
                                            <pre className="mt-4 text-sm font-mono text-slate-800 whitespace-pre-wrap bg-white p-4 rounded-xl border border-emerald-100 shadow-inner"><code>{currentPrac.answer}</code></pre>
                                        </details>
                                    </div>
                                )}
                           </div>

                           <div className="lg:col-span-7 flex flex-col space-y-6">
                              <div className="bg-slate-950 rounded-[2.5rem] p-10 lg:p-12 text-blue-300 relative shadow-inner">
                                <div className="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
                                    <span className="text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2"><Icon name="code" size={16}/> BigQuery Simulator</span>
                                    <button onClick={()=>{
                                        const res = bigQueryEngine(pracQuery, currentPrac, PRAC_TABLE_DATA);
                                        setPracResult(res);
                                        if (res.success) {
                                            if (!solvedPrac.includes(pracStep)) {
                                                const newSolved = [...solvedPrac, pracStep];
                                                setSolvedPrac(newSolved);
                                                localStorage.setItem('sql_solved_prac', JSON.stringify(newSolved));
                                            }
                                        }
                                    }} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl text-xs font-black transition-all flex items-center gap-2 shadow-lg">RUN QUERY <Icon name="play" size={14} fill="white" /></button>
                                </div>
                                <textarea className="w-full bg-transparent border-none focus:ring-0 font-mono text-xl h-48 resize-none placeholder-slate-700 leading-relaxed" placeholder="이곳에 쿼리를 작성하세요..." value={pracQuery} onChange={(e)=>setPracQuery(e.target.value)} spellCheck="false" />
                                
                                {pracResult && (
                                  <div className={`mt-10 p-8 rounded-[2rem] border-2 animate-in zoom-in-95 duration-500 ${pracResult.success ? 'bg-emerald-50 border-emerald-500 text-slate-900' : 'bg-rose-50 border-rose-400 text-slate-900'}`}>
                                    <div className="flex items-start gap-4 mb-6">
                                      {pracResult.success ? <Icon name="check-square" size={32} className="text-emerald-500"/> : <Icon name="alert-circle" size={32} className="text-rose-500"/>}
                                      <div className="text-base space-y-1 flex-1">
                                        <p className={`font-black text-2xl ${pracResult.success ? 'text-emerald-600' : 'text-rose-600'}`}>{pracResult.success ? "정답입니다! (Correct Answer)" : "오답 (Incorrect)"}</p>
                                        <p className={`font-medium ${pracResult.success ? 'text-slate-600' : 'text-rose-500'} whitespace-pre-wrap break-keep`}>{pracResult.error || "쿼리가 성공적으로 실행되었습니다."}</p>
                                      </div>
                                    </div>
                                    {pracResult.data !== null && pracResult.data !== undefined && (
                                      <div className={`mt-6 pt-8 border-t ${pracResult.success ? 'border-emerald-200' : 'border-rose-200'}`}>
                                        <h5 className={`text-sm font-black uppercase mb-4 flex items-center gap-2 ${pracResult.success ? 'text-emerald-600' : 'text-rose-600'}`}><Icon name="table" size={16}/> 실행 결과 (Result)</h5>
                                        <div className="overflow-x-auto rounded-2xl border-2 bg-white"><table className="min-w-full text-sm text-left border-collapse">
                                          <thead className="bg-slate-50 border-b"><tr>{pracResult.data.length > 0 && Object.keys(pracResult.data[0]).map(k=><th key={k} className="px-3 py-2 font-bold text-center border-x">{k}</th>)}</tr></thead>
                                          <tbody>{pracResult.data.map((row, i)=><tr key={i} className="border-b">{Object.values(row).map((v,j)=><td key={j} className="px-3 py-2 font-mono border-x text-center">{v !== null && v !== undefined ? String(v) : 'NULL'}</td>)}</tr>)}</tbody>
                                        </table></div>
                                      </div>
                                    )}
                                  </div>
                                )}
                              </div>
                              <div className="flex justify-between items-center pt-2">
                                <button onClick={() => alert(`힌트: ${currentPrac.hint}`)} className="text-slate-400 hover:text-blue-600 text-sm font-black flex items-center gap-2 transition-colors uppercase"><Icon name="help-circle" size={18}/> 힌트 보기</button>
                                {pracResult && pracResult.success && (
                                  <button onClick={() => { if(pracStep < PRACTICAL_DATA.length - 1) { setPracStep(pracStep + 1); setPracQuery(''); setPracResult(null); setShowPracAnswer(false); setTimeout(() => { const el = document.getElementById('pracContentScroll'); if(el) el.scrollTop = 0; }, 0); } }} className="bg-blue-600 text-white px-12 py-5 rounded-[2rem] font-black hover:scale-105 transition-all shadow-xl flex items-center gap-3 text-xl">다음 과제 <Icon name="chevron-right" size={24}/></button>
                                )}
                              </div>
                           </div>
                        </div>
                      </div>
                    </main>
                  </React.Fragment>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
