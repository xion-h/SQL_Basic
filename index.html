<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL 기본 마스터 - 데이터 논리의 완성</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Google Fonts: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif; }
        code { font-family: 'Consolas', 'Monaco', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .active-step-shadow { box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.15); }
        .content-scroll { scroll-behavior: smooth; }
        .text-balance { text-wrap: balance; }
        .break-keep { word-break: keep-all; }
        
        /* Venn Diagram Styles */
        .venn-container { position: relative; width: 220px; height: 140px; margin: 0 auto; }
        .venn-circle-base { position: absolute; width: 120px; height: 120px; border-radius: 50%; border: 2px solid #cbd5e1; background: #fff; transition: all 0.3s ease; }
        .venn-circle-a { left: 0; top: 10px; }
        .venn-circle-b { right: 0; top: 10px; }
        .join-active-fill { background-color: #3b82f6 !important; opacity: 0.6 !important; }
        .venn-intersection { position: absolute; left: 50px; top: 10px; width: 70px; height: 120px; overflow: hidden; z-index: 20; }
        .intersection-fill { position: absolute; left: -50px; width: 120px; height: 120px; border-radius: 50%; background-color: #3b82f6; opacity: 0; transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide && lucide.icons[name]) {
                    const iconNode = lucide.icons[name];
                    const svg = lucide.createElement(iconNode);
                    svg.setAttribute('width', size);
                    svg.setAttribute('height', size);
                    svg.setAttribute('class', `lucide lucide-${name} ${className}`);
                    svg.setAttribute('stroke-width', '2');
                    svg.setAttribute('stroke', 'currentColor');
                    svg.setAttribute('fill', 'none');
                    containerRef.current.innerHTML = '';
                    containerRef.current.appendChild(svg);
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        const STEPS_DATA = [
            {
                step: 1,
                title: "데이터 꺼내기",
                grammar: "FROM & SELECT",
                subtitle: "데이터 바구니에서 필요한 것만 고르기",
                theory: "SQL은 우리가 읽는 순서와 다르게 '어디서(FROM)' 데이터를 가져올지부터 결정한 뒤, '무엇을(SELECT)' 보여줄지 고민합니다.\n\n[사용 방법]\nSELECT 컬럼명1, 컬럼명2 FROM 테이블명;\n\nAS(별칭)를 사용하여 결과 화면의 이름을 예쁘게 지어줄 수 있습니다.",
                checkpoint: "SELECT에서 정한 별명을 바로 옆 컬럼 계산에서 쓰면 에러가 납니다. 컴퓨터는 아직 이름표가 붙기 전 단계에서 계산을 시도하기 때문입니다.",
                targetTable: "orders (주문 내역)",
                sourceData: [
                    { order_id: 'A1', price: 10000 },
                    { order_id: 'A2', price: 20000 },
                    { order_id: 'A3', price: 15000 }
                ],
                goal: "주문ID와 가격에 세금(10%)을 더한 값을 계산하세요.",
                logicDetail: "orders 테이블에서 1) 주문ID(order_id) 컬럼과 2) 가격(price)에 1.1을 곱해 세금이 포함된 값을 구한 후 final_price라는 이름을 붙여 출력합니다.",
                example: "SELECT \n  order_id,\n  price * 1.1 AS final_price\nFROM orders;",
                mockResult: [
                    { order_id: 'A1', final_price: 11000 },
                    { order_id: 'A2', final_price: 22000 },
                    { order_id: 'A3', final_price: 16500 }
                ],
                icons: "database"
            },
            {
                step: 2,
                title: "조건으로 거르기",
                grammar: "WHERE",
                subtitle: "필요 없는 데이터 입구 컷!",
                theory: "WHERE는 데이터를 뭉치기 전에 한 줄씩 검사하는 필터입니다.\n\n[사용 방법]\nSELECT ... FROM ... WHERE [조건];\n\n문자열은 따옴표(' ')로 감싸고, 숫자는 그대로 씁니다. 날짜 형식이 '20260101' 형태라면 숫자 크기 비교 연산이 가능합니다.",
                checkpoint: "데이터에 빈 값(NULL)이 섞여 있으면 일반 비교(=, !=)로는 찾아낼 수 없습니다. 반드시 'IS NULL' 또는 'IS NOT NULL'을 사용하세요.",
                targetTable: "users (회원 목록)",
                sourceData: [
                    { u_id: '1', city: '서울', join_date: 20260101 },
                    { u_id: '2', city: '부산', join_date: 20260301 },
                    { u_id: '3', city: '서울', join_date: 20260415 }
                ],
                goal: "서울 거주자 중 2026년 2월 이후 가입자만 찾기",
                logicDetail: "users 테이블에서 1) 거주지(city)가 '서울'이고 2) 가입일(join_date)이 20260201 이후인 데이터의 id와 도시명을 가져옵니다.",
                example: "SELECT u_id, city, join_date\nFROM users\nWHERE city = '서울'\n  AND join_date >= 20260201;",
                mockResult: [
                    { u_id: '3', city: '서울', join_date: 20260415 }
                ],
                icons: "filter"
            },
            {
                step: 3,
                title: "데이터 요약하기",
                grammar: "COUNT, SUM, AVG",
                subtitle: "기본 연산 함수 마스터",
                theory: "전체 데이터의 합계나 평균 등을 구합니다. 단일 행이 아닌 전체 범위를 요약하는 과정입니다.\n\n[사용 방법]\n- COUNT(*): 전체 데이터 행 수\n- SUM(컬럼): 해당 컬럼의 합계\n- AVG(컬럼): 해당 컬럼의 평균\n\nSELECT SUM(amt) FROM 테이블;",
                checkpoint: "AVG(평균) 계산 시 NULL 값은 분모에서 제외됩니다. 0으로 채워서 평균을 낼지, 제외할지 비즈니스 로직을 명확히 해야 합니다.",
                targetTable: "sales (매출 내역)",
                sourceData: [
                    { sale_id: 'S1', amt: 5000 },
                    { sale_id: 'S2', amt: 6000 },
                    { sale_id: 'S3', amt: 10000 }
                ],
                goal: "전체 주문 건수와 총 매출, 평균 매출액 구하기",
                logicDetail: "sales 테이블에서 1) 전체 행의 개수(COUNT)와 2) 매출액(amt)의 총합(SUM), 3) 매출액의 평균(AVG)을 각각 계산하여 하나의 행으로 출력합니다.",
                example: "SELECT \n  COUNT(*) AS total_cnt,\n  SUM(amt) AS total_sales,\n  AVG(amt) AS avg_sales\nFROM sales;",
                mockResult: [
                    { total_cnt: 3, total_sales: 21000, avg_sales: 7000 }
                ],
                icons: "plus-circle"
            },
            {
                step: 4,
                title: "그룹화 및 필터링",
                grammar: "GROUP BY & HAVING",
                subtitle: "끼리끼리 뭉쳐서 거르기",
                theory: "데이터를 그룹으로 묶은 후, 그 결과값에 조건을 겁니다.\n\n[사용 방법]\nSELECT 기준, SUM(값) FROM ... GROUP BY 기준 HAVING SUM(값) > 100;\n\nWHERE는 뭉치기 전 필터, HAVING은 뭉친 결과물에 대한 필터입니다.",
                checkpoint: "SELECT 절에 집계 함수(SUM 등)가 아닌 컬럼이 있다면, 그 컬럼은 반드시 GROUP BY 절에도 똑같이 적어줘야 에러가 나지 않습니다.",
                targetTable: "sales (지역별 매출)",
                sourceData: [
                    { region: '서울', amt: 5000 },
                    { region: '서울', amt: 7000 },
                    { region: '부산', amt: 3000 }
                ],
                goal: "지역별 총 매출을 구하고, 합계가 1만 원 넘는 지역만 보기",
                logicDetail: "sales 테이블에서 1) 지역(region)별로 데이터를 묶고 2) 각 지역의 합계(SUM)를 구한 뒤 3) 그 합이 10,000보다 큰 서울 지역만 남깁니다.",
                example: "SELECT region, SUM(amt) AS total\nFROM sales\nGROUP BY region\nHAVING SUM(amt) > 10000;",
                mockResult: [
                    { region: '서울', total: 12000 }
                ],
                icons: "layers"
            },
            {
                step: 5,
                title: "데이터 형식 바꾸기",
                grammar: "CAST",
                subtitle: "숫자를 문자로, 문자를 숫자로",
                theory: "데이터 그릇의 모양을 강제로 바꿉니다. 숫자가 문자로 저장되어 있으면 더하기 연산이 불가능하기 때문입니다.\n\n[사용 방법]\nCAST(컬럼 AS INT64) -> 숫자로\nCAST(컬럼 AS STRING) -> 문자로",
                checkpoint: "글자 '500'에 100을 더하면 에러가 나거나 '500100'이 될 수 있습니다. 연산 전에는 반드시 숫자로 형변환이 되었는지 확인하세요.",
                targetTable: "raw_data (미가공 데이터)",
                sourceData: [
                    { id: '1', val: '500' },
                    { id: '2', val: '300' },
                    { id: '3', val: '1000' }
                ],
                goal: "문자열 val을 숫자로 바꿔 500을 더하기",
                logicDetail: "raw_data 테이블에서 1) 컬럼 id 와 2) val 을 숫자로 변환(CAST)한 값을 구한 후 500을 더한 calc_val을 출력합니다.",
                example: "SELECT \n  id,\n  CAST(val AS INT64) + 500 AS calc_val\nFROM raw_data;",
                mockResult: [
                    { id: '1', calc_val: 1000 },
                    { id: '2', calc_val: 800 },
                    { id: '3', calc_val: 1500 }
                ],
                icons: "refresh-cw"
            },
            {
                step: 6,
                title: "조건에 따라 나누기",
                grammar: "CASE WHEN",
                subtitle: "데이터 등급 매기기",
                theory: "비즈니스 조건에 따라 값을 분류합니다.\n\n[사용 방법]\nCASE WHEN 조건 THEN 결과 ELSE 그외 END AS 이름;\n\n복잡한 'If-Else' 로직을 쿼리 한 줄로 구현할 수 있습니다.",
                checkpoint: "ELSE를 생략하면 조건에 해당하지 않는 데이터는 모두 NULL이 됩니다. '그 외'를 뜻하는 ELSE를 적어주는 방어적 코딩이 중요합니다.",
                targetTable: "points (회원 포인트)",
                sourceData: [
                    { user: 'K', pt: 150 },
                    { user: 'L', pt: 50 },
                    { user: 'M', pt: 100 }
                ],
                goal: "100점 이상은 '상', 미만은 '하'로 등급 분류",
                logicDetail: "points 테이블에서 1) 사용자 이름과 2) 포인트(pt)가 100 이상이면 '상', 그 외에는 '하'라는 별도의 등급 컬럼(pt_level)을 생성합니다.",
                example: "SELECT \n  user,\n  CASE \n    WHEN pt >= 100 THEN '상'\n    ELSE '하'\n  END AS pt_level\nFROM points;",
                mockResult: [
                    { user: 'K', pt_level: '상' },
                    { user: 'L', pt_level: '하' },
                    { user: 'M', pt_level: '상' }
                ],
                icons: "split"
            },
            {
                step: 7,
                title: "테이블 합치기",
                grammar: "JOIN",
                subtitle: "자석처럼 데이터 이어 붙이기",
                theory: "두 테이블을 공통 키(ID 등)를 기준으로 옆으로 붙입니다.\n\n- LEFT JOIN: 왼쪽(A) 데이터는 무조건 보존\n- INNER JOIN: 양쪽 모두에 데이터가 있는 것만 남김",
                checkpoint: "JOIN 후에 데이터가 갑자기 늘어났다면(뻥튀기), 오른쪽 테이블에 동일한 키 값이 여러 개 중복되어 있는지 의심해봐야 합니다.",
                targetTable: "orders & users (회원-주문)",
                sourceData: [
                    { o_id: '1', u_id: 'A' },
                    { o_id: '2', u_id: 'B' },
                    { u_id: 'A', name: '김철수' }
                ],
                goal: "주문 정보에 고객 이름을 붙여서 출력",
                logicDetail: "orders 테이블(a)을 기준으로 1) users 테이블(b)을 u_id가 일치하는 것끼리 왼쪽 조인하여 2) 주문번호와 사용자 이름을 나란히 출력합니다.",
                example: "SELECT a.o_id, b.name\nFROM orders a\nLEFT JOIN users b ON a.u_id = b.u_id;",
                mockResult: [
                    { o_id: '1', name: '김철수' },
                    { o_id: '2', name: 'NULL' }
                ],
                icons: "link",
                visualType: "join_left"
            },
            {
                step: 8,
                title: "쿼리 구조화하기",
                grammar: "WITH",
                subtitle: "단계별로 깔끔하게 정리하기",
                theory: "긴 쿼리를 임시 테이블로 쪼개어 가독성을 높입니다.\n\n[사용 방법]\nWITH 임시테이블명 AS (쿼리)\nSELECT ... FROM 임시테이블명;",
                checkpoint: "서브쿼리보다 WITH 문이 훨씬 읽기 쉽습니다. 실무에서는 동료들을 위해 복잡한 로직을 WITH 문으로 쪼개서 작성하세요.",
                targetTable: "daily_sales (일별 매출)",
                sourceData: [
                    { dt: '2026-01-01', amt: 100 },
                    { dt: '2026-01-01', amt: 200 },
                    { dt: '2026-01-02', amt: 500 }
                ],
                goal: "날짜별 합계를 구한 후, 그 평균값 계산하기",
                logicDetail: "1) 먼저 일별 합계를 계산한 daily_summary 임시 테이블을 정의하고, 2) 그 요약된 테이블을 조회하여 전체 평균(AVG)을 구합니다.",
                example: "WITH daily_summary AS (\n  SELECT dt, SUM(amt) AS day_total \n  FROM daily_sales \n  GROUP BY dt\n)\nSELECT AVG(day_total) AS total_avg \nFROM daily_summary;",
                mockResult: [
                    { total_avg: 400 }
                ],
                icons: "layout"
            },
            {
                step: 9,
                title: "쿼리 안에 쿼리 넣기",
                grammar: "Subquery",
                subtitle: "동적인 값을 조건으로 활용하기",
                theory: "다른 쿼리의 결과를 조건(WHERE) 등에 바로 씁니다.\n\n괄호() 안의 쿼리가 먼저 실행되어 바깥 쿼리에 값을 전달합니다.",
                checkpoint: "서브쿼리가 너무 깊어지면 유지보수가 매우 힘들어집니다. 2단계 이상의 중첩은 가급적 WITH 문으로 전환을 고려하세요.",
                targetTable: "all_employees (직원 목록)",
                sourceData: [
                    { name: 'Kim', sal: 5000 },
                    { name: 'Lee', sal: 3000 },
                    { name: 'Park', sal: 7000 }
                ],
                goal: "평균 급여보다 많이 받는 직원 찾기",
                logicDetail: "1) 서브쿼리(괄호 안)를 통해 전체 직원 급여 평균을 구하고, 2) 그 값보다 큰 급여를 받는 직원의 이름을 필터링합니다.",
                example: "SELECT name \nFROM all_employees \nWHERE sal > (SELECT AVG(sal) FROM all_employees);",
                mockResult: [
                    { name: 'Kim' },
                    { name: 'Park' }
                ],
                icons: "box"
            },
            {
                step: 10,
                title: "데이터에 순서 정하기",
                grammar: "ROW_NUMBER",
                subtitle: "중복 중 최신 데이터 1건 고르기",
                theory: "특정 기준에 따라 데이터에 1, 2, 3... 번호를 매깁니다.\n\n- PARTITION BY: 누구별로 번호를 매길 것인가\n- ORDER BY: 어떤 순서로 1등을 줄 것인가",
                checkpoint: "중복 제거용으로 쓸 때, ORDER BY 기준에 최신순(DESC)을 누락하면 엉뚱한 과거 데이터가 1번이 되어버립니다. 정렬 방향을 꼭 확인하세요.",
                targetTable: "login_log (로그인 기록)",
                sourceData: [
                    { user: 'A', time: '09:00' },
                    { user: 'A', time: '11:00' },
                    { user: 'B', time: '10:00' }
                ],
                goal: "유저별로 가장 마지막 방문 기록 1건씩 추출",
                logicDetail: "login_log에서 1) 유저(user)별로 묶고 2) 시간(time)이 늦은 순(DESC)으로 순번을 매긴 뒤, 3) 1번인 최신 로그만 남깁니다.",
                example: "SELECT * \nFROM login_log\nQUALIFY ROW_NUMBER() OVER(PARTITION BY user ORDER BY time DESC) = 1;",
                mockResult: [
                    { user: 'A', time: '11:00' },
                    { user: 'B', time: '10:00' }
                ],
                icons: "list-ordered"
            }
        ];

        const JoinVisualizer = ({ type }) => {
            return (
                <div className="flex flex-col items-center justify-center space-y-4">
                    <div className="venn-container">
                        <div className={`venn-circle-base venn-circle-a border-blue-600 ${type === 'join_left' ? 'join-active-fill' : ''} flex items-center justify-center`}>
                            <span className={`text-xs font-bold ${type === 'join_left' ? 'text-white' : 'text-blue-600'}`}>Table A</span>
                        </div>
                        <div className="venn-circle-base venn-circle-b flex items-center justify-center">
                            <span className="text-xs font-bold text-slate-400">Table B</span>
                        </div>
                        <div className="venn-intersection">
                            <div className={`intersection-fill ${type === 'join_left' ? 'opacity-100' : ''}`}></div>
                        </div>
                    </div>
                    <div className="text-center px-4">
                        <span className="inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-bold uppercase tracking-widest mb-2">LEFT JOIN (현재 기준)</span>
