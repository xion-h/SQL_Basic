<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL 10일 기본 완성: 실무 마스터 (검증 모드)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- sql.js: WASM 바이너리 로딩 최적화 버전 -->
    <script src="https://unpkg.com/sql.js@1.8.0/dist/sql-wasm.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .sql-editor { font-family: 'Consolas', 'Monaco', 'Fira Code', monospace !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .break-keep { word-break: keep-all; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CustomIcon = ({ name, className = "w-5 h-5", color = "currentColor" }) => {
            const icons = {
                database: <path d="M3 5V19C3 20.1 5.24 21 8 21C10.76 21 13 20.1 13 19V5C13 3.9 10.76 3 8 3C5.24 3 3 3.9 3 5M3 5C3 6.1 5.24 7 8 7C10.76 7 13 6.1 13 5M3 12C3 13.1 5.24 14 8 14C10.76 14 13 13.1 13 12M13 19C13 20.1 15.24 21 18 21C20.76 21 23 20.1 23 19V10C23 8.9 20.76 8 18 8C15.24 8 13 8.9 13 10M13 10C13 11.1 15.24 12 18 12C20.76 12 23 11.1 23 10M13 15C13 16.1 15.24 17 18 17C20.76 17 23 16.1 23 15" />,
                check: <polyline points="20 6 9 17 4 12" />,
                lock: <React.Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></React.Fragment>,
                award: <React.Fragment><circle cx="12" cy="8" r="7" /><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" /></React.Fragment>,
                info: <React.Fragment><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></React.Fragment>,
                layout: <React.Fragment><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></React.Fragment>,
                play: <polygon points="5 3 19 12 5 21 5 3" />,
                message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
                eye: <React.Fragment><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></React.Fragment>,
                alert: <React.Fragment><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></React.Fragment>,
                copy: <React.Fragment><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></React.Fragment>,
                book: <React.Fragment><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></React.Fragment>,
                code: <React.Fragment><polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" /></React.Fragment>
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const schemaData = {
            Customers: {
                columns: ["id", "name", "age", "city", "join_date"],
                types: ["TEXT", "TEXT", "INTEGER", "TEXT", "TEXT"],
                samples: [
                    ["C_001", "김철수", 32, "서울", "20260301"],
                    ["C_002", "이영희", 28, "경기", "20260305"],
                    ["C_003", "박민수", 54, "서울", "20260220"],
                    ["C_004", "최지우", 35, "서울", "20260215"], 
                    ["C_005", "정다은", 31, "인천", "20260310"]
                ]
            },
            Plans: {
                columns: ["plan_id", "plan_name", "price"],
                types: ["TEXT", "TEXT", "INTEGER"],
                samples: [
                    ["P_01", "5G 프리미어 에센셜", 85000],
                    ["P_02", "5G 스탠다드", 75000],
                    ["P_03", "(LTE) 추가 요금 걱정 없는 데이터 69", 69000]
                ]
            },
            Subscriptions: {
                columns: ["sub_id", "id", "plan_id", "status"],
                types: ["TEXT", "TEXT", "TEXT", "TEXT"],
                samples: [
                    ["S_101", "C_001", "P_03", "Churned"], // 서울, LTE 69, Churned
                    ["S_102", "C_002", "P_02", "Churned"], // 경기, 5G 스탠다드, Churned
                    ["S_103", "C_003", "P_03", "Churned"], // 서울, LTE 69, Churned -> 서울/P03 합쳐서 2건 발생 유도
                    ["S_104", "C_004", "P_01", "Active"],
                    ["S_105", "C_005", "P_03", "Active"]
                ]
            },
            Usage: {
                columns: ["id", "sales"],
                types: ["TEXT", "INTEGER"],
                samples: [
                    ["C_001", 3500], ["C_002", 1200], ["C_003", 2100], ["C_004", 4200], ["C_005", 2800]
                ]
            }
        };

        const curriculum = [
            { 
                day: 1, title: "데이터 필터링", tables: ["Customers"], 
                syntax: "SELECT [컬럼명] FROM [테이블] WHERE [조건];\n• 문자열 값은 반드시 홑따옴표(')로 감싸야 합니다.\n• 여러 조건은 AND로 연결하며, 숫자 범위는 BETWEEN을 활용할 수 있습니다.", 
                hint: "city='서울', age 30대, join_date가 20260228보다 큰 조건을 AND로 연결하세요.", 
                question: `[사업팀] 마케팅 캠페인 대상을 선정하기 위해, 2026년 2월 28일 이후에 가입한 서울 지역의 30대 고객 명단을 알고 싶어 합니다.\n(출력 컬럼: 모든 컬럼)`, 
                solution: `SELECT *\nFROM Customers\nWHERE\n  1=1\n  AND city = '서울'\n  AND age BETWEEN 30 AND 39\n  AND join_date > '20260228'\n;`, 
                token: "XN_01_SUCC",
                checkOrder: false 
            },
            { 
                day: 2, title: "가공과 정렬", tables: ["Customers"], 
                syntax: "CASE WHEN [조건] THEN [결과] ELSE [나머지] END AS [별칭];\n• 조건의 순서가 중요합니다. 위에서부터 순차적으로 체크됩니다.\n• ORDER BY [컬럼] DESC는 높은 숫자/최신 날짜부터 정렬합니다.", 
                hint: "나이 < 30 (청년), 나이 < 50 (중년), 그 외 (장년) 조건을 CASE WHEN으로 작성하세요. 정렬 시 DESC를 잊지 마세요.", 
                question: `[영업팀] 고객별 타겟 영업을 위해 고객을 청년(30세 미만), 중년(30세~49세), 장년(50세 이상)으로 분류하고, 나이가 많은 순으로 정렬된 리스트를 요청했습니다.\n(출력 컬럼: name, age, age_group)`, 
                solution: `SELECT name, age,\n  CASE WHEN age < 30 THEN '청년'\n       WHEN age < 50 THEN '중년'\n       ELSE '장년' END as age_group\nFROM Customers\nORDER BY age DESC\n;`, 
                token: "XN_02_SUCC",
                checkOrder: true 
            },
            { 
                day: 3, title: "데이터 형 변환 및 필터", tables: ["Customers"], 
                syntax: "CAST([컬럼] AS [타입]);\n• 문자열 '20260101'을 숫자로 바꾸려면 AS INTEGER를 사용합니다.\n• 형 변환은 연산이 필요한 경우나 데이터 타입을 통일할 때 필수입니다.", 
                hint: "WHERE join_date > '20260303' 조건을 사용하고, SELECT 절에서 CAST를 적용하세요.", 
                question: `[고객유지팀] 최근 캠페인 대상 확인을 위해, 2026년 3월 3일 이후에 가입한 고객들의 이름과 숫자 형태(INTEGER)로 변환된 가입날짜 데이터를 확인하려 합니다.\n(출력 컬럼: name, join_date_int)`, 
                solution: `SELECT name, \n  CAST(join_date AS INTEGER) as join_date_int\nFROM Customers\nWHERE join_date > '20260303'\n;`, 
                token: "XN_03_SUCC",
                checkOrder: false
            },
            { 
                day: 4, title: "다중 테이블 결합", tables: ["Customers", "Subscriptions", "Plans"], 
                syntax: "FROM [T1] JOIN [T2] ON [T1.Key] = [T2.Key];\n• 여러 테이블을 이을 때는 공통된 키값(예: id)을 기준으로 연결합니다.\n• 테이블명 뒤에 한 글자 별칭(예: Customers C)을 주면 코드가 간결해집니다.", 
                hint: "status가 'Active'인 경우만 필터링하세요.", 
                question: `[상품팀] 현재 활성화(Active)된 요금제를 이용 중인 고객들의 이름과 해당 요금제 명칭을 매칭하여 인기 요금제 현황을 보고 싶어 합니다.\n(출력 컬럼: name, plan_name)`, 
                solution: `SELECT C.name, P.plan_name\nFROM Customers C\nJOIN Subscriptions S ON C.id = S.id\nJOIN Plans P ON S.plan_id = P.plan_id\nWHERE\n  1=1\n  AND S.status = 'Active'\n;`, 
                token: "XN_04_SUCC",
                checkOrder: false
            },
            { 
                day: 5, title: "통계 요약 (LEFT JOIN)", tables: ["Customers", "Usage"], 
                syntax: "FROM [T1] LEFT JOIN [T2] ON ...;\n• LEFT JOIN은 왼쪽 테이블의 모든 데이터를 보존합니다.\n• 매출이 없는 고객까지 포함하여 지역별 인구수를 정확히 집계할 때 필수입니다.", 
                hint: "지역별 전체 고객수를 보려면 INNER JOIN이 아닌 LEFT JOIN을 써야 합니다.", 
                question: `[사업팀] 지역별 시장 점유율 분석을 위해 각 지역에 거주하는 모든 고객 수와 해당 지역에서 발생한 총 매출액 합계를 보고 싶습니다. (매출이 없는 고객도 지역 통계에 포함되어야 합니다.)\n(출력 컬럼: city, user_cnt, total_sales)`, 
                solution: `SELECT \n  C.city,\n  COUNT(DISTINCT C.id) as user_cnt,\n  SUM(U.sales) as total_sales\nFROM Customers C\nLEFT JOIN Usage U ON C.id = U.id\nGROUP BY C.city\n;`, 
                token: "XN_05_SUCC",
                checkOrder: false
            },
            { 
                day: 6, title: "조건별 등급 산정", tables: ["Plans"], 
                syntax: "CASE WHEN [비교] THEN [결과] ... ELSE [결과] END;\n• 실무에서는 특정 임계치(8만원 등)를 기준으로 그룹을 라벨링할 때 자주 씁니다.\n• 출력되는 텍스트(HVC 등) 역시 홑따옴표를 사용하세요.", 
                hint: "가격(price)이 80,000원 이상이면 'HVC', 아니면 '그외'로 분류하세요.", 
                question: `[영업팀] 요금제 상향 판매(Upselling)를 위해 요금제 가격이 80,000원 이상이면 'HVC', 아니면 '그외'로 구분된 상품 등급표를 알고 싶습니다.\n(출력 컬럼: plan_name, price_grade)`, 
                solution: `SELECT plan_name, \n  CASE WHEN price >= 80000 THEN 'HVC' \n       ELSE '그외' END as price_grade\nFROM Plans\n;`, 
                token: "XN_06_SUCC",
                checkOrder: false
            },
            { 
                day: 7, title: "그룹 필터링", tables: ["Customers", "Usage"], 
                syntax: "SELECT ... GROUP BY ... HAVING [집계결과에 대한 조건];\n• WHERE는 데이터를 묶기 전에 필터링하고, HAVING은 묶인 결과(평균 등)를 필터링합니다.\n• 실행 순서: FROM > WHERE > GROUP BY > HAVING > SELECT", 
                hint: "평균 매출액이 2000원 이상인 조건은 HAVING 절에 써야 합니다.", 
                question: `[사업팀] 마케팅 리소스를 집중 투여하기 위해, 평균 매출액이 2,000원 이상인 '고가치 지역' 리스트를 확인하고 싶습니다.\n(출력 컬럼: city, avg_sales)`, 
                solution: `SELECT city, AVG(sales) as avg_sales\nFROM Customers C\nJOIN Usage U ON C.id = U.id\nGROUP BY city\nHAVING avg_sales >= 2000\n;`, 
                token: "XN_07_SUCC",
                checkOrder: false
            },
            { 
                day: 8, title: "서브쿼리 기초", tables: ["Customers", "Usage"], 
                syntax: "SELECT ... FROM [T1] JOIN (SELECT ...) [Alias] ON ...;\n• 서브쿼리는 괄호()로 감싸며 반드시 별칭(Alias)을 붙여야 합니다.\n• 안쪽 쿼리가 먼저 실행되어 하나의 임시 테이블 역할을 수행합니다.", 
                hint: "Usage 테이블에서 sales > 3000인 데이터를 먼저 서브쿼리로 추출하세요.", 
                question: `[사업팀] 핵심 고객 관리를 위해 매출액이 3,000원을 초과한 적이 있는 고객들의 이름과 해당 매출액을 요청했습니다.\n(출력 컬럼: name, sales)`, 
                solution: `SELECT name, sales\nFROM Customers C\nJOIN (\n  SELECT id, sales \n  FROM Usage \n  WHERE sales > 3000\n) U ON C.id = U.id\n;`, 
                token: "XN_08_SUCC",
                checkOrder: false
            },
            { 
                day: 9, title: "WITH절 활용 (CTE)", tables: ["Usage", "Customers"], 
                syntax: "WITH [별칭] AS (SELECT ... ) SELECT ...;\n• 서브쿼리가 많아질 때 쿼리 상단에 미리 정의하여 가독성을 높이는 구문입니다.\n• 빅쿼리 등 최신 환경에서 가장 권장되는 코드 구조입니다.", 
                hint: "Day 8의 서브쿼리 부분을 맨 위로 올려서 'WITH high_sales AS (...)'로 정의하세요.", 
                question: `[유지팀] 유지 전략 보고서 작성을 위해 Day 08과 같은 결과를 추출하되, 가독성을 높이기 위해 WITH 구문을 사용하여 쿼리를 재작성하고 싶습니다.\n(출력 컬럼: name, sales)`, 
                solution: `WITH high_sales AS (\n  SELECT id, sales \n  FROM Usage \n  WHERE sales > 3000\n)\nSELECT C.name, H.sales\nFROM Customers C\nJOIN high_sales H ON C.id = H.id\n;`, 
                token: "XN_09_SUCC",
                checkOrder: false
            },
            { 
                day: 10, title: "최종 실무 리포트", tables: ["Subscriptions", "Customers", "Plans"], 
                syntax: "SELECT ... FROM ... JOIN ... WHERE ... GROUP BY ... ORDER BY ...;\n• 지금까지 배운 모든 요소를 결합합니다.\n• 2건 이상의 해지가 발생한 그룹이 생겼으므로 반드시 GROUP BY와 정렬을 수행해야 합니다.", 
                hint: "status = 'Churned'인 데이터만 필터링하여 지역과 요금제별로 묶으세요. 정렬은 churn_cnt 기준 내림차순입니다.", 
                question: `[고객유지팀] 해지 원인 분석을 위해 서비스를 해지(Churned)한 고객들이 어느 지역에서, 어떤 요금제를 주로 썼는지 해지 건수 통계 리포트를 알고 싶어 합니다. 해지 건수가 많은 순으로 정렬하세요.\n(출력 컬럼: city, plan_name, churn_cnt)`, 
                solution: `SELECT \n  C.city, \n  P.plan_name, \n  COUNT(*) as churn_cnt\nFROM Subscriptions S\nJOIN Customers C ON S.id = C.id\nJOIN Plans P ON S.plan_id = P.plan_id\nWHERE\n  1=1\n  AND S.status = 'Churned'\nGROUP BY 1, 2\nORDER BY 3 DESC\n;`, 
                token: "XN_10_SUCC",
                checkOrder: true 
            }
        ];

        function ResultTable({ data, title }) {
            if (!data) return null;
            return (
                <div className="mt-4 border rounded-xl overflow-hidden bg-white shadow-sm border-slate-200 animate-fade text-left">
                    <div className="bg-slate-800 text-white px-3 py-2 text-[12px] font-bold uppercase tracking-widest text-center border-b border-slate-700">{title}</div>
                    <div className="overflow-x-auto custom-scrollbar">
                        <table className="w-full text-sm text-left border-collapse">
                            <thead><tr className="bg-slate-50 border-b">
                                {data.columns.map(c => <th key={c} className="px-4 py-3 font-bold text-slate-500 uppercase whitespace-nowrap text-center border-x border-slate-200">{c}</th>)}
                            </tr></thead>
                            <tbody>{data.values.map((row, i) => (
                                <tr key={i} className="border-b last:border-0 hover:bg-slate-50 transition-colors">
                                    {row.map((val, j) => {
                                        const alignClass = typeof val === 'number' ? 'text-left' : 'text-right';
                                        return (
                                            <td key={j} className={`px-4 py-3 font-mono text-slate-600 whitespace-nowrap ${alignClass} border-x border-slate-100`}>
                                                {val === null ? 'null' : String(val)}
                                            </td>
                                        );
                                    })}
                                </tr>
                            ))}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
            const [currentDay, setCurrentDay] = useState(1);
            const [userQuery, setUserQuery] = useState("");
            const [db, setDb] = useState(null);
            const [queryResult, setQueryResult] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);
            const [errorReason, setErrorReason] = useState("");
            const [solvedDays, setSolvedDays] = useState([]);
            const [showHint, setShowHint] = useState(false);
            const [showVerificationAnswer, setShowVerificationAnswer] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('sql_master_v7_final_solved');
                if (saved) setSolvedDays(JSON.parse(saved));

                initSqlJs({ locateFile: file => `https://unpkg.com/sql.js@1.8.0/dist/${file}` }).then(SQL => {
                    const database = new SQL.Database();
                    Object.keys(schemaData).forEach(name => {
                        const t = schemaData[name];
                        const colDefs = t.columns.map((c, i) => '"' + c + '" ' + t.types[i]).join(",");
                        database.run("CREATE TABLE " + name + " (" + colDefs + ")");
                        t.samples.forEach(row => database.run("INSERT INTO " + name + " VALUES (" + row.map(() => "?").join(",") + ")", row));
                    });
                    setDb(database);
                }).catch(err => {
                    setErrorReason("SQL 엔진 초기화 오류가 발생했습니다. 브라우저를 새로고침 해주세요.");
                });
            }, []);

            const getFriendlyErrorMessage = (errorMsg) => {
                const lowerMsg = errorMsg.toLowerCase();
                if (lowerMsg === "missing semicolon") {
                    return `[마침표 오류] SQL 문장 끝에 세미콜론(;)이 없습니다. SQL의 마침표인 세미콜론을 정확히 찍었는지 확인해 보세요.`;
                }
                if (lowerMsg.includes("unrecognized token")) {
                    if (userQuery.includes("'") && (userQuery.split("'").length - 1) % 2 !== 0) {
                        return `[따옴표 쌍 오류] 문법 어딘가에 홑따옴표(') 하나가 짝 없이 남겨져 있습니다. 모든 문자열 값이 시작과 끝에 따옴표 쌍을 제대로 갖췄는지 확인해 보세요.`;
                    }
                    return `[구문 오류] SQL 엔진이 이해할 수 없는 기호가 포함되어 있습니다. 불필요한 따옴표나 오타가 없는지 확인하세요.`;
                }
                if (lowerMsg.includes("no such column")) {
                    const parts = errorMsg.split(": ");
                    const col = parts.length > 1 ? parts[1] : 'unknown';
                    if (userQuery.includes('`') || userQuery.includes('"')) {
                        return `[따옴표 오류] '${col}'라는 컬럼을 찾을 수 없습니다. SQL에서 문자열(값)을 입력할 때는 백틱(\`)이나 쌍따옴표(")가 아닌 홑따옴표(')를 사용해야 합니다.`;
                    }
                    return `[컬럼 오류] '${col}'라는 이름의 컬럼이 테이블에 존재하지 않습니다. 컬럼명 오타가 없는지, 혹은 값(Value)을 따옴표 없이 입력하지 않았는지 확인하세요.`;
                }
                if (lowerMsg.includes("syntax error")) {
                    return `[문법 오류] 쿼리 문법이 올바르지 않습니다. 쉼표(,) 누락이나 구문의 순서를 확인하세요.`;
                }
                return errorMsg;
            };

            const runQuery = () => {
                if (!db) return;
                setIsCorrect(null); setShowHint(false); setErrorReason("");
                try {
                    const cleanedQuery = userQuery.replace(/\u00a0/g, ' ').trim();
                    if (!cleanedQuery) {
                        setErrorReason("에디터에 쿼리를 먼저 작성해 주세요.");
                        setIsCorrect(false);
                        return;
                    }
                    if (!cleanedQuery.endsWith(';')) {
                        throw new Error("missing semicolon");
                    }
                    
                    const active = curriculum.find(c => c.day === currentDay) || curriculum[0];
                    const answerRes = db.exec(active.solution);
                    const userRes = db.exec(cleanedQuery);
                    
                    if (userRes.length > 0) {
                        setQueryResult(userRes[0]);
                        const uCols = userRes[0].columns;
                        const aCols = answerRes[0].columns;
                        const uValues = userRes[0].values;
                        const aRows = answerRes[0].values;

                        if (uCols.length !== aCols.length) {
                            setErrorReason(`정보(컬럼) 선택이 잘못되었습니다. 정답은 ${aCols.length}개의 열을 보여주어야 하지만, 현재 ${uCols.length}개의 열만 출력되었습니다.`);
                            setIsCorrect(false);
                        } else if (uValues.length !== aRows.length) {
                            const hasAggregate = /avg|sum|count|min|max/i.test(cleanedQuery);
                            const hasGroupBy = /group by/i.test(cleanedQuery);
                            if (hasAggregate && !hasGroupBy && aRows.length > 1) {
                                setErrorReason(`[그룹화 오류] 집계 함수(AVG, SUM 등)를 사용했으나 GROUP BY 절이 누락되었습니다. 이로 인해 데이터 건수가 정답과 다릅니다.`);
                            } else {
                                if (currentDay === 5 && !/left join/i.test(cleanedQuery)) {
                                     setErrorReason(`[조인 논리 오류] 매출 기록이 없는 고객까지 포함하기 위해 'LEFT JOIN'이 필요합니다. 그냥 JOIN을 쓰면 기록이 없는 고객이 통계에서 누락됩니다.`);
                                } else {
                                     setErrorReason(`데이터 건수(행)가 정답과 다릅니다. 필터(WHERE) 조건을 확인해 주세요. 정답은 ${aRows.length}건이지만, 현재 ${uValues.length}건이 출력되었습니다.`);
                                }
                            }
                            setIsCorrect(false);
                        } else {
                            const normalizeRowValues = (row) => JSON.stringify([...row]); // 순서 보존을 위해 sort 제거
                            
                            let userRowsStr = uValues.map(normalizeRowValues);
                            let answerRowsStr = aRows.map(normalizeRowValues);

                            if (!active.checkOrder) {
                                // 정렬이 상관 없는 미션은 행 순서 정규화
                                userRowsStr.sort();
                                answerRowsStr.sort();
                            }

                            const match = JSON.stringify(userRowsStr) === JSON.stringify(answerRowsStr);

                            if (match) {
                                setIsCorrect(true);
                                if (!solvedDays.includes(currentDay)) {
                                    const next = [...solvedDays, currentDay];
                                    setSolvedDays(next);
                                    localStorage.setItem('sql_master_v7_final_solved', JSON.stringify(next));
                                }
                            } else {
                                if (active.checkOrder) {
                                    setErrorReason("데이터 건수는 맞지만, 출력된 행의 순서가 정답과 다릅니다. 지문의 정렬(ORDER BY) 조건을 다시 확인해 보세요.");
                                } else {
                                    setErrorReason("행/열의 개수는 맞지만, 데이터 내용이 다릅니다. 조건의 값이나 범위를 다시 한 번 확인해 보세요.");
                                }
                                setIsCorrect(false);
                            }
                        }
                    } else { 
                        setErrorReason("결과 데이터가 없습니다. 필터(WHERE) 조건이 너무 까다롭거나 쿼리 문법에 오류가 없는지 확인해 보세요.");
                        setIsCorrect(false); 
                    }
                } catch (e) { 
                    setErrorReason(getFriendlyErrorMessage(e.message));
                    setIsCorrect(false); 
                }
            };

            const active = curriculum.find(c => c.day === currentDay) || curriculum[0];

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 text-left">
                    <div className="flex-grow">
                        <header className="max-w-7xl mx-auto p-4 md:p-10 pb-4 flex flex-col md:flex-row justify-between items-center gap-8 border-b border-slate-200">
                            <div className="flex items-center gap-4 text-left shrink-0">
                                <div className="bg-blue-600 p-2.5 rounded-2xl shadow-lg shadow-blue-200 shrink-0"><CustomIcon name="database" color="white" /></div>
                                <div className="whitespace-nowrap">
                                    <h1 className="text-2xl font-black text-slate-900 tracking-tighter uppercase leading-none mb-1">SQL 10일 기본 완성</h1>
                                    <p className="text-[10px] text-blue-600 font-bold uppercase tracking-widest leading-none">데이터 분석의 첫걸음, SQL 기본 마스터</p>
                                </div>
                            </div>
                            <div className="flex gap-1 overflow-x-auto pb-2 max-w-full md:max-w-[60%] lg:max-w-none custom-scrollbar text-left">
                                {curriculum.map(c => (
                                    <button key={c.day} onClick={() => {setCurrentDay(c.day); setUserQuery(""); setQueryResult(null); setIsCorrect(null); setShowHint(false); setShowVerificationAnswer(false); setErrorReason("");}} className={"px-4 py-2 rounded-xl text-xs font-black transition-all shrink-0 flex items-center gap-2 " + (currentDay === c.day ? "bg-blue-600 text-white scale-105 shadow-lg" : "bg-white text-slate-400 border border-slate-200 hover:border-blue-400")}>
                                        {solvedDays.includes(c.day) ? <CustomIcon name="check" className="w-3 h-3" color="#10b981" /> : <CustomIcon name="play" className="w-3 h-3" />} Day {c.day < 10 ? '0' + c.day : c.day}
                                    </button>
                                ))}
                            </div>
                        </header>

                        <main className="max-w-7xl mx-auto p-4 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10 pb-48">
                            <div className="lg:col-span-4 space-y-6">
                                <section className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm text-left animate-fade h-fit">
                                    <div className="flex justify-between items-start mb-2">
                                        <h2 className="text-sm font-black text-blue-600 uppercase tracking-widest">MISSION {active.day}</h2>
                                        <span className="bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">검증 모드</span>
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-900 mb-6 tracking-tight text-left break-keep">{active.title}</h3>
                                    
                                    <div className="space-y-4 mb-8 text-left">
                                        <div className="flex items-center gap-2 text-slate-900 text-left text-blue-600">
                                            <CustomIcon name="message" className="w-5 h-5" />
                                            <h4 className="font-black text-xs uppercase tracking-widest text-left">비즈니스 상황</h4>
                                        </div>
                                        <div className="bg-blue-600 p-6 rounded-2xl text-white shadow-xl shadow-blue-200/50 relative overflow-hidden border-2 border-blue-400 font-bold italic leading-relaxed text-[15px]">
                                            <CustomIcon name="message" className="absolute -bottom-2 -right-2 w-16 h-16 text-blue-500 opacity-20" />
                                            <p className="relative z-10 whitespace-pre-wrap text-left break-keep">"{active.question}"</p>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-100 text-left">
                                        <h4 className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest flex items-center gap-1">
                                            <CustomIcon name="book" className="w-3 h-3" /> 상세 문법 가이드
                                        </h4>
                                        <p className="text-[11px] font-medium text-slate-600 leading-relaxed text-left break-keep whitespace-pre-line">{active.syntax}</p>
                                    </div>
                                    
                                    <button onClick={() => setShowHint(!showHint)} className="text-[10px] font-black text-slate-400 hover:text-blue-600 flex items-center gap-1 uppercase tracking-tighter transition-colors w-full justify-start text-left">
                                        <CustomIcon name="info" className="w-3 h-3" /> {showHint ? "힌트 닫기" : "힌트 보기"}
                                    </button>
                                    {showHint && <p className="mt-3 p-4 bg-amber-50 text-amber-700 text-[11px] rounded-xl border border-amber-100 animate-fade leading-relaxed text-left break-keep">💡 {active.hint}</p>}
                                </section>

                                <section className="bg-emerald-900 rounded-3xl overflow-hidden shadow-2xl animate-fade text-left h-fit">
                                    <div className="px-5 py-3 bg-emerald-800 flex justify-between items-center border-b border-emerald-700">
                                        <div className="flex items-center gap-2 text-left">
                                            <CustomIcon name="eye" className="w-4 h-4 text-emerald-300" />
                                            <span className="text-[10px] font-black text-emerald-100 uppercase tracking-widest text-left">검증용 정답 레퍼런스</span>
                                        </div>
                                        <button onClick={() => setShowVerificationAnswer(!showVerificationAnswer)} className="text-[10px] font-bold text-emerald-300 hover:text-white transition-colors uppercase">
                                            {showVerificationAnswer ? "숨기기" : "보기"}
                                        </button>
                                    </div>
                                    {showVerificationAnswer ? (
                                        <div className="p-6 relative text-left">
                                            <pre className="text-[12px] font-mono text-emerald-200 leading-relaxed overflow-x-auto custom-scrollbar whitespace-pre text-left">
                                                {active.solution}
                                            </pre>
                                            <div className="mt-4 pt-4 border-t border-emerald-800/50 flex items-center gap-2 text-emerald-400 text-[10px] font-bold italic text-left">
                                                <CustomIcon name="copy" className="w-3 h-3" /> 드래그하여 복사 후 우측 에디터에 테스트해보세요.
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="p-8 text-center"><p className="text-emerald-400 text-xs font-bold opacity-60 text-left">정답 코드가 이곳에 표시됩니다.</p></div>
                                    )}
                                </section>
                            </div>

                            <div className="lg:col-span-8 space-y-6 flex flex-col">
                                <div className="space-y-3 text-left animate-fade">
                                    <div className="flex items-center gap-2 px-1 text-left">
                                        <CustomIcon name="layout" className="w-4 h-4 text-slate-400" />
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest text-left">Required Tables Reference</h3>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-left">
                                        {active.tables.map(name => (
                                            <div key={name} className="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm hover:border-blue-200 transition-all text-left">
                                                <span className="text-[10px] font-black text-blue-600 uppercase tracking-widest block mb-1.5 flex items-center gap-1 text-left">
                                                    <CustomIcon name="database" className="w-3 h-3" /> {name}
                                                </span>
                                                <div className="overflow-x-auto custom-scrollbar text-left">
                                                    <table className="w-full text-[12px] text-left border-collapse">
                                                        <thead><tr className="border-b text-slate-400 font-bold">
                                                            {schemaData[name].columns.map(c => <th key={c} className="px-3 py-2 uppercase text-center border-x border-slate-100">{c}</th>)}
                                                        </tr></thead>
                                                        <tbody>{schemaData[name].samples.map((row, i) => <tr key={i} className="border-b border-slate-50 last:border-0">
                                                            {row.map((val, j) => {
                                                                const alignClass = typeof val === 'number' ? 'text-left' : 'text-right';
                                                                return <td key={j} className={`px-3 py-2 font-mono text-slate-600 whitespace-nowrap ${alignClass} border-x border-slate-100`}>{String(val)}</td>;
                                                            })}
                                                        </tr>)}</tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col border border-slate-700 text-left">
                                    <div className="bg-slate-800 px-8 py-4 border-b border-slate-700 flex justify-between items-center text-left">
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 text-left">
                                            <CustomIcon name="code" className="w-3 h-3" /> SQL Editor
                                        </span>
                                    </div>
                                    <textarea className="p-8 bg-slate-900 text-blue-100 font-mono text-sm focus:outline-none resize-none h-[300px] leading-relaxed sql-editor text-left" placeholder="-- 직접 쿼리를 작성하거나 왼쪽 정답을 참고하세요." value={userQuery} onChange={e => setUserQuery(e.target.value)}></textarea>
                                    <div className="p-6 bg-slate-800 border-t border-slate-700 flex justify-end">
                                        <button onClick={runQuery} className="bg-blue-600 hover:bg-blue-700 text-white px-12 py-3 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all flex items-center gap-2 uppercase tracking-widest">
                                            <CustomIcon name="play" className="w-4 h-4 fill-current" /> RUN MISSION
                                        </button>
                                    </div>
                                    {isCorrect !== null && (
                                        <div className={"p-8 border-t border-slate-800 text-left " + (isCorrect ? "bg-emerald-950/20" : "bg-rose-950/20")}>
                                            <div className="flex items-center justify-between mb-4 text-sm font-black tracking-tight text-left">
                                                {isCorrect ? 
                                                    <div className="text-emerald-400 flex items-center gap-2 animate-bounce text-left text-left"><CustomIcon name="award" className="w-5 h-5" /> SUCCESS! 인증코드: {active.token}</div> : 
                                                    <div className="text-rose-400 flex items-start gap-2 text-left">
                                                        <CustomIcon name="alert" className="w-5 h-5 shrink-0 mt-0.5 text-left" />
                                                        <div>
                                                            <p className="uppercase text-[10px] opacity-70 font-black text-left text-rose-500">Logic Diagnosis</p>
                                                            <p className="font-bold leading-relaxed text-left break-keep">{errorReason}</p>
                                                        </div>
                                                    </div>
                                                }
                                            </div>
                                            {queryResult && <ResultTable data={queryResult} title="Your Execution Output" />}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>
                    </div>
                    <footer className="bg-white border-t border-slate-200 p-8 text-slate-300 text-[10px] font-black uppercase tracking-[0.4em] text-center shrink-0 relative z-10 text-center">
                        SQL Mastery Course v7.5 - Day 10 Data Update for Meaningful Aggregation
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
