<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL 기본 마스터 : 이론편 - 데이터 논리의 완성</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Google Fonts: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif; }

<body class="bg-slate-50 text-slate-900 leading-relaxed overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide && lucide.icons[name]) {
                    const iconNode = lucide.icons[name];
                    const svg = lucide.createElement(iconNode);
                    svg.setAttribute('width', size);
                    svg.setAttribute('height', size);
                    svg.setAttribute('class', `lucide lucide-${name} ${className}`);
                    svg.setAttribute('stroke-width', '2');
                    svg.setAttribute('stroke', 'currentColor');
                    svg.setAttribute('fill', 'none');
                    containerRef.current.innerHTML = '';
                    containerRef.current.appendChild(svg);
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        const STEPS_DATA = [
            {
                step: 1,
                title: "데이터 기본 규칙",
                grammar: "FROM & SELECT",
                subtitle: "빅쿼리의 표준 작성 형식 이해하기",
                theory: "SQL은 데이터를 찾아낼 대상을 정하고(FROM), 그 안에서 출력할 항목을 선택(SELECT)하는 것으로 시작합니다.\n\n[사용 방법]\n- SELECT [컬럼명1], [컬럼명2] : 보고 싶은 데이터를 나열합니다.\n- FROM `프로젝트.데이터셋.테이블` : 데이터를 가져올 위치를 백틱(` `)으로 감싸 지정합니다.\n- AS [별칭] : 컬럼 이름이 복잡하거나 계산식인 경우 새로운 이름을 부여합니다.\n\n빅쿼리에서는 문자열 값은 반드시 작은따옴표(' ')로 감싸야 하며, 명령문의 끝에는 세미콜론(;)을 붙여 쿼리의 끝을 알립니다.",
                checkpoint: "SELECT 절에서 만든 별칭(AS)은 실행 순서상 '가장 마지막'에 생성됩니다. 따라서 같은 줄에 있는 다른 연산에서 그 별칭을 바로 사용할 수 없음을 명심하세요.",
                targetTable: "orders",
                sourceData: {
                    "orders": [
                        { order_id: 'A1', price: 10000 },
                        { order_id: 'A2', price: 20000 },
                        { order_id: 'A3', price: 15000 }
                    ]
                },
                goal: "주문ID와 가격에 세금(10%)을 더한 값을 계산하세요.",
                logicDetail: "orders 테이블에서 1) 주문ID(order_id) 컬럼과 2) 가격(price)에 1.1을 곱해 세금이 포함된 값을 구한 후 final_price라는 이름을 붙여 출력합니다.",
                example: "SELECT \n  order_id,\n  price * 1.1 AS final_price\nFROM orders;",
                mockResult: [
                    { order_id: 'A1', final_price: 11000 },
                    { order_id: 'A2', final_price: 22000 },
                    { order_id: 'A3', final_price: 16500 }
                ],
                icons: "database"
            },
            {
                step: 2,
                title: "조건으로 거르기",
                grammar: "WHERE",
                subtitle: "데이터 필터링과 논리 연산자",
                theory: "WHERE 절을 사용하면 전체 데이터 중 특정 조건에 맞는 행(Row)만 골라낼 수 있습니다.\n\n[사용 방법]\n- WHERE [컬럼명] [연산자] [값] : 필터 조건을 작성합니다.\n- AND : 나열된 모든 조건이 참(True)이어야 할 때 사용합니다. (조건1 AND 조건2)\n- OR : 조건 중 하나라도 참이면 결과에 포함합니다.\n- IN (값1, 값2) : 여러 후보 값 중 하나라도 일치하면 추출합니다.\n- BETWEEN A AND B : A와 B 사이의 범위에 있는 값을 찾습니다.",
                checkpoint: "데이터에 빈 값(NULL)이 포함된 경우, '=' 이나 '!=' 연산자로는 걸러지지 않습니다. 반드시 'IS NULL' 또는 'IS NOT NULL'을 사용하여 데이터 누락 가정을 확인하십시오.",
                targetTable: "users",
                sourceData: {
                    "users": [
                        { u_id: '1', city: '서울', join_date: 20260101 },
                        { u_id: '2', city: '부산', join_date: 20260301 },
                        { u_id: '3', city: '서울', join_date: 20260415 }
                    ]
                },
                goal: "서울 거주자 중 2026년 2월 이후 가입자만 찾기",
                logicDetail: "users 테이블에서 1) 거주지(city)가 '서울'이고(AND) 2) 가입일(join_date)이 20260201 이후인 데이터를 필터링하여 id와 도시명을 가져옵니다.",
                example: "SELECT u_id, city, join_date\nFROM users\nWHERE city = '서울'\n  AND join_date >= 20260201;",
                mockResult: [
                    { u_id: '3', city: '서울', join_date: 20260415 }
                ],
                icons: "filter"
            },
            {
                step: 3,
                title: "데이터 연산하기",
                grammar: "COUNT, SUM, AVG",
                subtitle: "수치 데이터의 집계와 요약",
                theory: "개별 행의 나열이 아니라 전체적인 수치 정보를 파악하고 싶을 때 집계 함수를 사용합니다.\n\n[핵심 함수 사용법]\n- COUNT([컬럼]) : 해당 항목의 개수를 셉니다. (*를 쓰면 전체 행 수를 셉니다)\n- SUM([컬럼]) : 숫자 데이터의 총합을 구합니다.\n- AVG([컬럼]) : 숫자 데이터의 산술 평균을 계산합니다.\n- MIN / MAX : 최솟값과 최댓값을 구합니다.",
                checkpoint: "집계 함수는 기본적으로 NULL 값을 무시합니다. 특히 AVG 계산 시 NULL 값이 분모에서 빠지는 것을 인지하고 있는지, 0으로 처리해야 하지는 않는지 검증이 필요합니다.",
                targetTable: "sales",
                sourceData: {
                    "sales": [
                        { sale_id: 'S1', amt: 5000 },
                        { sale_id: 'S2', amt: 6000 },
                        { sale_id: 'S3', amt: 10000 }
                    ]
                },
                goal: "전체 주문 건수와 총 매출, 평균 매출액 구하기",
                logicDetail: "sales 테이블에서 1) 전체 행의 개수(COUNT)와 2) 매출액(amt)의 총합(SUM), 3) 매출액의 평균(AVG)을 각각 계산하여 하나의 요약된 행으로 출력합니다.",
                example: "SELECT \n  COUNT(*) AS total_cnt,\n  SUM(amt) AS total_sales,\n  AVG(amt) AS avg_sales\nFROM sales;",
                mockResult: [
                    { total_cnt: 3, total_sales: 21000, avg_sales: 7000 }
                ],
                icons: "plus-circle"
            },
            {
                step: 4,
                title: "그룹화 및 그룹 필터링",
                grammar: "GROUP BY & HAVING",
                subtitle: "기준별 데이터 묶기와 요약 결과 필터링",
                theory: "데이터를 특정 기준(차원)으로 그룹을 지어 통계를 낼 때 사용합니다.\n\n[사용 방법]\n- GROUP BY [기준컬럼] : 데이터를 묶을 기준을 명시합니다. SELECT 절의 일반 컬럼은 모두 여기에 포함되어야 합니다.\n- HAVING [집계조건] : GROUP BY로 뭉쳐진 '결과값'에 조건을 걸 때 사용합니다.\n\nSELECT 지역, SUM(매출) FROM 테이블 GROUP BY 지역 HAVING SUM(매출) > 5000;",
                checkpoint: "WHERE와 HAVING의 결정적 차이:\n- WHERE : 데이터를 뭉치기 전(Before) 개별 행을 필터링합니다.\n- HAVING : 데이터를 뭉친 후(After) 집계 결과(합계, 평균 등)를 필터링합니다.\n평균 매출액 1만 원 이상을 거르려면 무조건 HAVING을 써야 합니다.",
                targetTable: "sales",
                sourceData: {
                    "sales": [
                        { region: '서울', amt: 5000 },
                        { region: '서울', amt: 7000 },
                        { region: '부산', amt: 3000 }
                    ]
                },
                goal: "지역별 총 매출을 구하고, 합계가 1만 원 넘는 지역만 보기",
                logicDetail: "sales 테이블에서 1) 지역(region)별로 데이터를 묶고 2) 각 지역의 합계(SUM)를 구한 뒤 3) 그 합이 10,000보다 큰 지역만 필터링(HAVING)합니다.",
                example: "SELECT region, SUM(amt) AS total\nFROM sales\nGROUP BY region\nHAVING SUM(amt) > 10000;",
                mockResult: [
                    { region: '서울', total: 12000 }
                ],
                icons: "layers"
            },
            {
                step: 5,
                title: "형식 바꾸기",
                grammar: "CAST",
                subtitle: "빅쿼리 데이터 타입의 강제 변환",
                theory: "데이터가 저장된 형식(Type)을 강제로 변경하여 계산이나 결합이 가능하도록 만듭니다.\n\n[사용 방법]\n- CAST([데이터] AS [데이터형식])\n- STRING : 문자열 (텍스트 결합 시 유용)\n- INT64 : 정수 (산술 연산 시 유용)\n- DATE : 날짜 (날짜 연산 시 유용)\n\n예: CAST('20260401' AS INT64) -> 숫자로 변환되어 크기 비교 가능",
                checkpoint: "문자열 '100'과 숫자 100은 연산 방식이 완전히 다릅니다. '100' + '100'은 에러가 나거나 문자가 이어 붙을 수 있으므로 연산 전 형변환을 반드시 거치세요.",
                targetTable: "raw_data",
                sourceData: {
                    "raw_data": [
                        { id: '1', val: '500' },
                        { id: '2', val: '300' },
                        { id: '3', val: '1000' }
                    ]
                },
                goal: "문자열 val을 숫자로 바꿔 500을 더하기",
                logicDetail: "raw_data 테이블에서 1) 컬럼 id 와 2) 문자열 형식인 val 을 숫자(INT64)로 변환(CAST)한 후 500을 더해 계산값을 구합니다.",
                example: "SELECT \n  id,\n  CAST(val AS INT64) + 500 AS calc_val\nFROM raw_data;",
                mockResult: [
                    { id: '1', calc_val: 1000 },
                    { id: '2', calc_val: 800 },
                    { id: '3', calc_val: 1500 }
                ],
                icons: "refresh-cw"
            },
            {
                step: 6,
                title: "조건에 따라 나누기",
                grammar: "CASE WHEN",
                subtitle: "쿼리 내 조건부 분기 로직 구현",
                theory: "데이터의 값에 따라 다른 결과를 출력하고 싶을 때 사용하는 조건문입니다.\n\n[사용 방법]\nCASE \n  WHEN [조건1] THEN [결과1] \n  WHEN [조건2] THEN [결과2] \n  ELSE [그외결과] \nEND AS [새이름];\n\n여러 개의 WHEN을 사용하여 다중 조건을 설정할 수 있으며, 위에서부터 순차적으로 조건을 검사합니다.",
                checkpoint: "ELSE 절은 생략 가능하지만, 생략할 경우 조건에 맞지 않는 모든 데이터는 자동으로 NULL 처리가 됩니다. 예상치 못한 결과 누락을 방지하기 위해 기본값(ELSE)을 설정하는 습관을 들이세요.",
                targetTable: "points",
                sourceData: {
                    "points": [
                        { user: 'K', pt: 150 },
                        { user: 'L', pt: 50 },
                        { user: 'M', pt: 100 }
                    ]
                },
                goal: "100점 이상은 '상', 미만은 '하'로 등급 분류",
                logicDetail: "points 테이블에서 1) 사용자 이름과 2) 포인트(pt)가 100 이상이면 '상', 그 외에는 '하'라는 별도의 비즈니스 등급(pt_level)을 생성합니다.",
                example: "SELECT \n  user,\n  CASE \n    WHEN pt >= 100 THEN '상'\n    ELSE '하'\n  END AS pt_level\nFROM points;",
                mockResult: [
                    { user: 'K', pt_level: '상' },
                    { user: 'L', pt_level: '하' },
                    { user: 'M', pt_level: '상' }
                ],
                icons: "split"
            },
            {
                step: 7,
                title: "테이블 합치기",

                subtitle: "공통 키를 활용한 데이터 결합",
                theory: "서로 다른 테이블에 흩어진 정보를 하나로 모읍니다. 공통된 연결 고리(ID 등)가 필요합니다.\n\n[사용 방법]\nSELECT a.컬럼, b.컬럼 \nFROM 테이블A AS a \nLEFT JOIN 테이블B AS b ON a.키 = b.키;\n\n- LEFT JOIN : 왼쪽 테이블 데이터를 유지하며 오른쪽 정보를 추가합니다.\n- INNER JOIN : 두 테이블 모두에 존재하는 데이터만 합칩니다.\n- ON : 결합 기준이 되는 컬럼을 지정합니다.",
                checkpoint: "JOIN을 수행할 때 기준이 되는 키(ID)에 중복값이 있으면 결과 행이 예상보다 기하급수적으로 늘어날 수 있습니다. 결합 전 대상 테이블의 중복 여부를 먼저 의심하고 확인하세요.",
                targetTable: "orders & users",
                sourceData: {
                    "orders": [
                        { o_id: '1', u_id: 'A' },

                        { o_id: '3', u_id: 'C' }

                    "users": [

                        { u_id: 'B', name: '이영희' },
                        { u_id: 'D', name: '박민수' }
                    ]
                },
                goal: "주문 정보에 고객 이름을 붙여서 출력",
                logicDetail: "orders 테이블(a)을 기준으로 1) users 테이블(b)을 u_id가 일치하는 것끼리 왼쪽 결합하여 2) 주문번호와 해당 사용자의 이름을 한 줄에 보여줍니다.",
                example: "SELECT a.o_id, b.name\nFROM orders a\nLEFT JOIN users b ON a.u_id = b.u_id;",
                mockResult: [
                    { o_id: '1', name: '김철수' },
                    { o_id: '2', name: '이영희' },
                    { o_id: '3', name: 'NULL' }
                ],
                icons: "link"
            },
            {
                step: 8,
                title: "단계별 구조화",
                grammar: "WITH",
                subtitle: "가독성 향상을 위한 가상 임시 테이블",
                theory: "복잡한 전체 과정을 논리적인 단계별 쿼리로 쪼개어 작성하는 기법입니다.\n\n[사용 방법]\nWITH [임시이름] AS (\n  SELECT ... FROM ...\n)\nSELECT ... FROM [임시이름];\n\n임시 테이블을 정의하여 위에서 아래로 흐르는 논리적인 쿼리 작성을 가능하게 합니다.",
                checkpoint: "서브쿼리를 과도하게 중첩하여 사용하면 가독성이 떨어져 나중에 고치기 매우 힘들어집니다. 실무에서는 동료들을 배려하여 가급적 WITH 문을 활용해 쿼리를 구조화하십시오.",

                goal: "날짜별 합계를 구한 후, 그 평균값 계산하기",

                    { total_avg: 400 }
                ],

            },
            {

                title: "중복 제거 및 순번",
                grammar: "ROW_NUMBER & QUALIFY",
                subtitle: "행 간 순서 지정과 분석 조건 필터링",
                theory: "데이터에 특정 기준(시간, 금액 등)으로 순위를 매깁니다. 빅쿼리의 QUALIFY는 이 순위를 즉시 필터링할 때 유용합니다.\n\n[사용 방법]\n- ROW_NUMBER() OVER(PARTITION BY [그룹] ORDER BY [정렬] DESC)\n- QUALIFY : 윈도우 함수(ROW_NUMBER 등)의 결과값에 직접 조건을 겁니다.\n\n유저별로 수많은 접속 로그가 있을 때 '가장 최근의 로그 1건'만 뽑을 때 필수적입니다.",
                checkpoint: "순위를 매길 때 ORDER BY의 정렬 방향(ASC/DESC)을 누락하면 순서가 무작위로 정해집니다. '최신 데이터'가 1번이 되게 하려면 반드시 시간순 DESC 정렬인지 의심하고 확인하세요.",
                targetTable: "login_log",
                sourceData: {
                    "login_log": [
                        { user: 'A', time: '09:00' },
                        { user: 'A', time: '11:00' },
                        { user: 'B', time: '10:00' }
                    ]
                },
                goal: "유저별로 가장 마지막 방문 기록 1건씩 추출",
                logicDetail: "login_log 테이블에서 1) 유저(user)별로 묶고 2) 방문 시간(time)이 가장 늦은 순서로 번호를 매긴 뒤, 3) 그 번호가 1번인 최신 로그만 QUALIFY를 통해 남깁니다.",
                example: "SELECT * \nFROM login_log\nQUALIFY ROW_NUMBER() OVER(PARTITION BY user ORDER BY time DESC) = 1;",
                mockResult: [
                    { user: 'A', time: '11:00' },
                    { user: 'B', time: '10:00' }
                ],
                icons: "list-ordered"
            }
        ];

        const JoinVisualizer = ({ grammar }) => {
            if (grammar !== 'JOIN') return null;
            return (
                <div className="flex flex-col items-center justify-center space-y-4 w-full">
                    <div className="w-full max-w-[240px] aspect-[12/7] relative">
                        <svg viewBox="0 0 240 140" className="w-full h-full drop-shadow-sm">
                            <circle cx="150" cy="70" r="55" fill="#ffffff" stroke="#cbd5e1" strokeWidth="2" />
                            <circle cx="90" cy="70" r="55" fill="#3b82f6" fillOpacity="0.6" stroke="#3b82f6" strokeWidth="3" />
                            <text x="70" y="75" fontSize="13" fontWeight="900" fill="#ffffff" textAnchor="middle" style={{pointerEvents: 'none'}}>Table A</text>
                            <text x="170" y="75" fontSize="13" fontWeight="900" fill="#64748b" textAnchor="middle" style={{pointerEvents: 'none'}}>Table B</text>
                        </svg>
                    </div>
                    <div className="text-center px-4">
                        <span className="inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-bold uppercase tracking-widest mb-2">LEFT JOIN (빅쿼리 표준)</span>
                        <p className="text-[11px] text-slate-500 break-keep leading-relaxed px-2">
                            왼쪽 테이블(A)의 데이터는 <strong>무조건 유지</strong>하며, 오른쪽(B)에 일치하는 데이터가 있을 때만 가져옵니다.
                        </p>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeStep, setActiveStep] = useState(1);
            const currentData = STEPS_DATA.find(item => item.step === activeStep);

            const getAlignmentClass = (val) => {
                if (typeof val === 'number') return 'text-left';
                return 'text-right';
            };

            return (
                <div className="h-screen flex flex-col bg-slate-50">
                    <nav className="flex-none bg-white border-b border-slate-200 z-50 shadow-sm">
                        <div className="max-w-full mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200">
                                    <Icon name="terminal" size={20} />
                                </div>
                                <h1 className="text-xl font-black text-slate-900 tracking-tight">SQL 기본 마스터 <span className="text-blue-600 font-medium text-sm ml-1">: 이론편</span></h1>
                            </div>
                            <button 
                                onClick={() => window.open('https://xion-h.github.io/SQL-Study/', '_blank')}
                                className="px-5 py-2.5 bg-slate-900 text-white text-xs font-bold rounded-xl hover:bg-slate-800 transition-all shadow-md flex items-center gap-2"
                            >
                                <Icon name="calendar-check" size={14} />
                                데일리 미션 사이트
                            </button>
                        </div>
                    </nav>

                    <div className="flex-grow flex overflow-hidden">
                        <aside className="w-80 flex-none bg-white border-r border-slate-200 overflow-y-auto p-6 hidden md:block">
                            <div className="mb-8 px-2">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">학습 로드맵</h2>
                                <p className="text-xs text-slate-500 font-medium leading-relaxed break-keep">빅쿼리(BigQuery) 표준에 최적화된 난이도별 커리큘럼입니다.</p>
                            </div>
                            <nav className="space-y-2">
                                {STEPS_DATA.map((item) => (
                                    <button
                                        key={item.step}
                                        onClick={() => setActiveStep(item.step)}
                                        className={`w-full flex items-center gap-4 p-4 rounded-2xl text-left transition-all ${
                                            activeStep === item.step 
                                            ? 'bg-blue-600 text-white active-step-shadow translate-x-1 shadow-lg shadow-blue-100' 
                                            : 'bg-white text-slate-600 hover:bg-slate-50 hover:translate-x-1 border border-transparent'
                                        }`}
                                    >
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-none font-black text-sm ${
                                            activeStep === item.step ? 'bg-white/20' : 'bg-slate-100'
                                        }`}>
                                            {item.step}
                                        </div>
                                        <div className="overflow-hidden py-1">
                                            <div className="text-sm font-bold break-keep leading-snug">{item.title}</div>
                                            <div className={`text-[11px] font-bold mt-1 tracking-tight ${activeStep === item.step ? 'text-blue-100' : 'text-slate-400'}`}>
                                                {item.grammar}
                                            </div>
                                        </div>
                                    </button>
                                ))}
                            </nav>
                        </aside>

                        <main className="flex-grow overflow-y-auto bg-slate-50 p-4 lg:p-12 pb-40 content-scroll">
                            <div className="max-w-5xl mx-auto space-y-8 animate-in fade-in duration-500">
                                <div className="space-y-3">
                                    <div className="flex items-center gap-2 text-blue-600 font-bold text-sm uppercase tracking-wider">
                                        <Icon name={currentData.icons} size={18} />
                                        <span>{currentData.step}단계 가이드</span>
                                    </div>
                                    <h2 className="text-3xl lg:text-4xl font-black text-slate-900 leading-tight break-keep text-balance">
                                        {currentData.title}: <span className="text-blue-600">{currentData.grammar}</span>
                                    </h2>
                                    <p className="text-lg text-slate-500 font-medium italic break-keep">
                                        "{currentData.subtitle}"
                                    </p>
                                </div>

                                <div className="grid gap-8">
                                    <div className={`grid grid-cols-1 ${currentData.grammar === 'JOIN' ? 'lg:grid-cols-3' : ''} gap-8`}>
                                        <div className={`${currentData.grammar === 'JOIN' ? 'lg:col-span-2' : ''} bg-white rounded-[2rem] p-6 lg:p-10 border border-slate-200 shadow-sm space-y-8`}>
                                            <section>
                                                <div className="flex items-center gap-2 mb-4">
                                                    <div className="w-1.5 h-6 bg-blue-600 rounded-full"></div>
                                                    <h4 className="text-sm font-black text-slate-900 uppercase tracking-widest">상세 이론 및 사용법</h4>
                                                </div>
                                                <p className="text-slate-700 text-lg leading-relaxed font-medium whitespace-pre-wrap break-keep">
                                                    {currentData.theory}
                                                </p>
                                            </section>

                                            <section className="bg-blue-50/50 rounded-2xl p-6 border border-blue-100 flex items-start gap-4">
                                                <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-blue-600 shadow-sm flex-none">
                                                    <Icon name="check-square" size={24} />
                                                </div>
                                                <div className="space-y-1 text-left">
                                                    <h5 className="font-black text-slate-900 text-lg leading-none pt-1">체크 포인트 (Check Point)</h5>
                                                    <p className="text-slate-600 text-base leading-relaxed break-keep">
                                                        {currentData.checkpoint}
                                                    </p>
                                                </div>
                                            </section>
                                        </div>
                                        
                                        {currentData.grammar === 'JOIN' && (
                                            <div className="lg:col-span-1">
                                                <div className="bg-white rounded-[2rem] p-6 border border-slate-200 shadow-sm h-full flex flex-col items-center justify-center min-h-[220px]">
                                                    <div className="flex items-center gap-2 mb-6 self-start">
                                                        <Icon name="eye" size={16} className="text-blue-600" />
                                                        <h4 className="text-sm font-black text-slate-900 uppercase tracking-widest">시각 논리 도표</h4>
                                                    </div>
                                                    <JoinVisualizer grammar={currentData.grammar} />
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="bg-white rounded-[2rem] p-6 lg:p-10 border border-slate-200 shadow-sm space-y-8">
                                        <div className="flex items-center gap-2 mb-2">
                                            <div className="w-1.5 h-6 bg-blue-600 rounded-full"></div>
                                            <h4 className="text-sm font-black text-slate-900 uppercase tracking-widest">실무 예제</h4>
                                        </div>

                                        <div className="space-y-6">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {Object.entries(currentData.sourceData).map(([tableName, rows]) => (
                                                    <div key={tableName} className="space-y-3">
                                                        <h5 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                            <Icon name="database" size={12} />
                                                            테이블명 : "{tableName}"
                                                        </h5>
                                                        <div className="border border-slate-100 rounded-2xl overflow-x-auto bg-slate-50/50">
                                                            <table className="min-w-full text-xs text-left border-collapse">
                                                                <thead className="bg-slate-100 border-b border-slate-200">
                                                                    <tr>
                                                                        {Object.keys(rows[0]).map(k => (
                                                                            <th key={k} className="px-4 py-3 font-bold text-slate-500 uppercase whitespace-nowrap text-center border border-slate-200">{k}</th>
                                                                        ))}
                                                                    </tr>
                                                                </thead>
                                                                <tbody className="divide-y divide-slate-200">
                                                                    {rows.map((row, i) => (
                                                                        <tr key={i}>
                                                                            {Object.values(row).map((v, j) => (
                                                                                <td key={j} className={`px-4 py-3 text-slate-600 whitespace-nowrap border border-slate-200 ${getAlignmentClass(v)}`}>{v}</td>
                                                                            ))}
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="grid grid-cols-1 gap-6">
                                                <div className="space-y-4">
                                                    <div className="bg-amber-50/50 rounded-3xl p-6 border border-amber-100">
                                                        <h5 className="text-[10px] font-black text-amber-600 uppercase tracking-widest mb-3">쿼리 의미 해석 (Query Logic Breakdown)</h5>
                                                        <p className="text-slate-700 text-sm font-medium leading-relaxed break-keep underline decoration-amber-200 underline-offset-4 decoration-2">
                                                            {currentData.logicDetail}
                                                        </p>
                                                    </div>

                                                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                                                        <div className="bg-slate-50 p-6 rounded-3xl border border-slate-200 flex flex-col justify-center">
                                                            <h5 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">구현 목표</h5>
                                                            <div className="space-y-4">
                                                                <div className="flex items-center gap-3 text-sm">
                                                                    <span className="text-slate-400 font-bold w-14 text-xs">테이블:</span>
                                                                    <code className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold">{currentData.targetTable}</code>
                                                                </div>
                                                                <div className="flex items-start gap-3 text-sm leading-relaxed text-slate-700">
                                                                    <span className="text-slate-400 font-bold w-14 flex-none text-xs">목표:</span>
                                                                    <span className="font-medium break-keep">{currentData.goal}</span>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div className="bg-slate-900 rounded-3xl p-6 text-blue-300 shadow-inner relative overflow-hidden min-h-[160px]">
                                                            <div className="text-[10px] font-bold text-slate-500 mb-3 flex items-center justify-between">
                                                                <span>쿼리 에디터 (BigQuery)</span>
                                                                <Icon name="code" size={14} className="opacity-30" />
                                                            </div>
                                                            <pre className="text-sm font-mono leading-relaxed overflow-x-auto whitespace-pre">
                                                                <code>{currentData.example}</code>
                                                            </pre>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="space-y-3">
                                                <h5 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                    <Icon name="table" size={12} />
                                                    예상 결과 화면
                                                </h5>
                                                <div className="border border-slate-200 rounded-2xl overflow-x-auto shadow-sm">
                                                    <table className="min-w-full text-sm text-left border-collapse">
                                                        <thead className="bg-slate-50 border-b border-slate-200">
                                                            <tr>
                                                                {Object.keys(currentData.mockResult[0]).map(key => (
                                                                    <th key={key} className="px-4 py-3 font-bold text-slate-500 uppercase text-[10px] tracking-wider text-center border border-slate-200">{key}</th>
                                                                ))}
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {currentData.mockResult.map((row, idx) => (
                                                                <tr key={idx} className="bg-white">
                                                                    {Object.values(row).map((val, i) => (
                                                                        <td key={i} className={`px-4 py-3 text-slate-700 font-mono text-xs whitespace-nowrap border border-slate-200 ${getAlignmentClass(val)}`}>{val}</td>
                                                                    ))}
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex items-center justify-between pt-10 pb-10">
                                    <button 
                                        onClick={() => setActiveStep(prev => Math.max(1, prev - 1))}
                                        disabled={activeStep === 1}
                                        className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${
                                            activeStep === 1 ? 'opacity-30 cursor-not-allowed text-slate-300' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 shadow-sm'
                                        }`}
                                    >
                                        <Icon name="chevron-left" size={18} />
                                        이전
                                    </button>
                                    
                                    <div className="text-xs font-black text-slate-400 tracking-widest uppercase bg-white px-5 py-2.5 rounded-full border border-slate-100 shadow-sm">
                                        {activeStep} / {STEPS_DATA.length}
                                    </div>

                                    <button 
                                        onClick={() => setActiveStep(prev => Math.min(STEPS_DATA.length, prev + 1))}
                                        disabled={activeStep === STEPS_DATA.length}
                                        className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${
                                            activeStep === STEPS_DATA.length ? 'opacity-30 cursor-not-allowed text-slate-300' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-200'
                                        }`}
                                    >
                                        다음
                                        <Icon name="chevron-right" size={18} />
                                    </button>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
